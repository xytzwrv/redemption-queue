<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWITCH PLINKO — 1-BIT FIELD SYSTEM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap');

  /* ---------- 1-BIT FIELD SYSTEM · EMBER ---------- */
  :root{
    --bg:#140d00;      /* dominant  · field */
    --blob:#c05a00;    /* secondary · structure */
    --dot:#ffd27a;     /* accent    · text / marks */
    --dim:#6e4300;     /* de-emphasized line */
    --mono: ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace;
    --pix: 'Silkscreen', var(--mono);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html, body{
    height:100%;
    background:transparent;              /* canvas paints the field */
    font-family:var(--mono); font-size:13px;
    color:var(--dot);
    overflow:hidden;
    -webkit-font-smoothing:none;
  }

  #board{ position:fixed; top:0; left:0; display:block;
          image-rendering:pixelated; image-rendering:crisp-edges; }

  img{ image-rendering:pixelated; image-rendering:crisp-edges; }

  /* ---------- status strip ---------- */
  #status{
    position:fixed; bottom:16px; left:16px; z-index:20;
    display:flex; align-items:center; gap:8px;
    font-family:var(--pix); font-size:10px; letter-spacing:2px;
    padding:6px 10px; border:1px solid var(--dot);
    background:var(--bg); color:var(--dot);
  }
  #status::before{ content:""; width:6px; height:6px; background:var(--dot); }
  #status.err{ border-color:var(--blob); color:var(--blob); }
  #status.err::before{ background:var(--blob); }

  /* ---------- connect gate ---------- */
  #gate{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:var(--bg); border:1px solid var(--dot);
    max-width:460px; z-index:30;
  }
  #gate .strip{
    display:flex; align-items:center; gap:8px; padding:8px 12px;
    border-bottom:1px solid var(--dot);
    font-family:var(--pix); font-size:10px; letter-spacing:2px;
  }
  #gate .strip .sq{ width:6px; height:6px; background:var(--dot); }
  #gate .inner{ padding:14px 12px; }
  #gate p{ margin:0 0 12px; font-size:12px; line-height:1.65; color:var(--dot); opacity:.8; }
  #gate code{ font-family:var(--mono); background:#00000055; border:1px solid var(--dim); padding:1px 4px; font-size:12px; word-break:break-all; }

  .btn{
    display:inline-flex; align-items:center; gap:8px;
    background:var(--bg); color:var(--dot); border:1px solid var(--dot);
    font-family:var(--pix); font-size:10px; letter-spacing:1px;
    padding:7px 12px; cursor:pointer; text-transform:uppercase;
  }
  .btn:hover, .btn.on{ background:var(--dot); color:var(--bg); }
  .btn.ghost{ border-color:var(--dim); color:var(--dot); opacity:.75; }
  .btn.ghost:hover{ background:var(--dot); color:var(--bg); opacity:1; }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn:disabled:hover{ background:var(--bg); color:var(--dot); }

  /* ---------- control bar ---------- */
  #controls{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:20; align-items:stretch;
  }
  .testwrap{
    display:flex; gap:8px; align-items:stretch;
    padding-left:12px; border-left:1px solid var(--dim);
  }
  .testwrap input{
    width:52px; background:var(--bg); color:var(--dot);
    border:1px solid var(--dot); font-family:var(--mono);
    font-size:12px; padding:3px; text-align:center;
  }
  .testwrap input:focus{ outline:none; border-color:var(--blob); }

  /* ---------- player lineup ---------- */
  #lineup{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    display:none; align-items:center; gap:12px;
    background:var(--bg); border:1px solid var(--dot);
    padding:6px 12px 6px 6px; z-index:20;
    max-width:min(80vw,900px);
  }
  #lineup .faces{ display:flex; overflow:hidden; }
  #lineup .faces img{
    width:26px; height:26px; border:1px solid var(--dot);
    margin-right:-1px; background:var(--dim);
  }
  #lineup .count{ font-family:var(--pix); font-size:10px; letter-spacing:1px; white-space:nowrap; }

  /* ---------- winner panel ---------- */
  #winner{
    position:fixed; top:38%; left:50%; transform:translate(-50%,-50%);
    display:none; flex-direction:column;
    background:var(--bg); border:1px solid var(--dot);
    z-index:25; min-width:280px;
  }
  #winner.show{ display:flex; animation:winpop .35s steps(4) forwards; }
  @keyframes winpop{ from{ transform:translate(-50%,-50%) scale(.7); } to{ transform:translate(-50%,-50%) scale(1); } }
  #winner .strip{
    display:flex; align-items:center; gap:8px; padding:8px 12px;
    border-bottom:1px solid var(--dot);
    font-family:var(--pix); font-size:10px; letter-spacing:2px;
  }
  #winner .strip .sq{ width:6px; height:6px; background:var(--dot); }
  #winner .inner{ display:flex; flex-direction:column; align-items:center; gap:8px; padding:18px 32px; }
  #winner img{ width:96px; height:96px; border:1px solid var(--dot); background:var(--dim); }
  #winner .wname{ font-family:var(--pix); font-weight:700; font-size:18px; letter-spacing:1px; }
  #winner .wpts{ font-family:var(--mono); font-size:13px; color:var(--blob); }
  #winner .wsub{ font-family:var(--pix); font-size:9px; letter-spacing:2px; opacity:.55; }

  /* ---------- leaderboard console ---------- */
  #lb{
    position:fixed; top:50%; right:16px; transform:translateY(-50%);
    display:none; flex-direction:column;
    background:var(--bg); border:1px solid var(--dot);
    z-index:24; width:300px;
  }
  #lb.show{ display:flex; }
  #lb .strip{
    display:flex; align-items:center; gap:8px; padding:8px 12px;
    border-bottom:1px solid var(--dot);
    font-family:var(--pix); font-size:10px; letter-spacing:2px;
  }
  #lb .strip .sq{ width:6px; height:6px; background:var(--dot); }
  #lb .rows{ display:flex; flex-direction:column; }
  #lb .row{
    display:flex; align-items:center; gap:10px;
    padding:6px 12px; border-bottom:1px solid var(--dim);
    font-size:12px;
  }
  #lb .rank{ width:18px; font-family:var(--pix); font-size:10px; color:var(--dim); flex:0 0 auto; }
  #lb .row:nth-child(1) .rank{ color:var(--dot); }
  #lb .row:nth-child(2) .rank, #lb .row:nth-child(3) .rank{ color:var(--blob); }
  #lb img{ width:20px; height:20px; border:1px solid var(--dim); background:var(--dim); flex:0 0 auto; }
  #lb .nm{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:var(--mono); }
  #lb .wins{ font-family:var(--mono); color:var(--dot); white-space:nowrap; }
  #lb .pts{ font-family:var(--mono); color:var(--blob); min-width:58px; text-align:right; white-space:nowrap; }
  #lb .none{ padding:10px 12px; font-size:11px; opacity:.55; }
  #lb .foot{ padding:10px 12px; display:flex; justify-content:center; border-top:1px solid var(--dim); }
  #lb .lbreset{ font-size:9px; padding:5px 10px; }
  #lb .lbreset.arm{ border-color:var(--blob); color:var(--blob); }
  #lb .lbreset.arm:hover{ background:var(--blob); color:var(--bg); }

  #lbToggle{
    position:fixed; top:16px; right:16px; z-index:20;
    background:var(--bg); color:var(--dot); border:1px solid var(--dot);
    font-family:var(--pix); font-size:10px; letter-spacing:1px;
    width:38px; height:32px; cursor:pointer; padding:0;
  }
  #lbToggle:hover{ background:var(--dot); color:var(--bg); }

  /* ---------- visual console (style-guide §05 component spec) ---------- */
  #fxToggle{
    position:fixed; top:16px; left:16px; z-index:20;
    background:var(--bg); color:var(--dot); border:1px solid var(--dot);
    font-family:var(--pix); font-size:10px; letter-spacing:1px;
    width:38px; height:32px; cursor:pointer; padding:0;
  }
  #fxToggle:hover{ background:var(--dot); color:var(--bg); }

  #fx{
    position:fixed; top:16px; left:16px; width:236px; z-index:26;
    display:none; flex-direction:column;
    background:var(--bg); border:1px solid var(--dot);
    max-height:calc(100vh - 32px); overflow-y:auto;
  }
  #fx.show{ display:flex; }
  #fx .strip{
    position:sticky; top:0; background:var(--bg);
    display:flex; align-items:center; gap:8px; padding:8px 12px;
    border-bottom:1px solid var(--dot);
    font-family:var(--pix); font-size:10px; letter-spacing:2px;
  }
  #fx .strip .sq{ width:6px; height:6px; background:var(--dot); }
  #fx .strip .x{
    margin-left:auto; background:none; border:0; color:var(--dot);
    font-family:var(--mono); font-size:14px; cursor:pointer; padding:0 2px;
  }
  #fx .strip .x:hover{ color:var(--blob); }
  #fx .grp{
    padding:10px 12px 2px; border-top:1px solid var(--dim);
    font-family:var(--pix); font-size:9px; letter-spacing:1.5px; opacity:.55;
  }
  #fx .grp:first-of-type{ border-top:0; }
  #fx .ctl{ padding:6px 12px 10px; }
  #fx .ctl .lr{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:var(--pix); font-size:9px; letter-spacing:1px; margin-bottom:5px;
  }
  #fx .ctl .lr .val{ font-family:var(--mono); font-size:11px; color:var(--dot); }
  #fx input[type=range]{
    -webkit-appearance:none; appearance:none;
    width:100%; height:11px; background:transparent; display:block;
  }
  #fx input[type=range]::-webkit-slider-runnable-track{ height:11px; background:var(--bg); border:1px solid var(--dot); }
  #fx input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:7px; height:9px; margin-top:1px; background:var(--dot); }
  #fx input[type=range]::-moz-range-track{ height:11px; background:var(--bg); border:1px solid var(--dot); box-sizing:border-box; }
  #fx input[type=range]::-moz-range-thumb{ width:7px; height:9px; background:var(--dot); border:0; border-radius:0; }
  #fx .togglerow{ display:flex; gap:8px; padding:2px 12px 10px; flex-wrap:wrap; }
  #fx .togglerow .btn{ flex:1; justify-content:center; font-size:9px; padding:5px 8px; }
  #fx .pals{ display:grid; grid-template-columns:repeat(4,1fr); gap:5px; padding:2px 12px 12px; }
  #fx .palc{ height:20px; border:1px solid var(--dim); display:flex; cursor:pointer; }
  #fx .palc.sel{ border-color:var(--dot); outline:1px solid var(--dot); outline-offset:-3px; }
  #fx .palc span{ flex:1; }
  #fx .foot{
    border-top:1px solid var(--dim); padding:8px 12px;
    display:flex; justify-content:space-between; align-items:center; gap:8px;
  }
  #fx .foot .hint{ font-family:var(--pix); font-size:8px; letter-spacing:1px; opacity:.5; }
  #fx .foot .btn{ font-size:9px; padding:4px 8px; }
</style>
</head>
<body>
  <canvas id="board"></canvas>

  <div id="status" style="display:none"></div>
  <div id="gate" style="display:none"></div>
  <div id="lineup"><div class="faces"></div><div class="count"></div></div>
  <div id="controls"></div>

  <div id="winner">
    <div class="strip"><span class="sq"></span>WINNER</div>
    <div class="inner">
      <img alt="">
      <div class="wname"></div>
      <div class="wpts"></div>
      <div class="wsub">PLINKO CHAMPION</div>
    </div>
  </div>

  <button id="lbToggle" title="Leaderboard">LB</button>
  <div id="lb"></div>

  <button id="fxToggle" title="Visual console (H)">FX</button>
  <div id="fx"></div>

  <script>
  /* ================================================================
     TWITCH PLINKO — chat drops in, avatars bounce, one wins.
     Styled to the 1-BIT FIELD SYSTEM: indexed tri-tone color,
     low-res pixel canvas, Bayer-dithered falloff, hairline chrome.
     ----------------------------------------------------------------
     SETUP (one time)
     1. Uses the same Twitch app as the redemption queue. On
        https://dev.twitch.tv/console/apps add this page's URL to the
        app's OAuth Redirect URLs, e.g.
            http://localhost:8777/plinko/plinko.html
     2. Serve over http (not file://) — the included server does this.
     3. In OBS add a Browser Source pointing at the URL above
        (1920x1080 recommended), right-click -> Interact to log in
        and to press the GATHER / DROP buttons.

     URL flags:
        ?demo=1          fake players, no Twitch login needed
        ?demo=1&count=60 number of fake players
        ?auto=1          gather + drop automatically on page load
        ?px=4            initial pixel size (1-12, default 1)
        ?alpha=1         start with ALPHA BG on (field pixels transparent)

     Press H in-page for the VISUALS console (pixel size, ball size,
     peg glow, palette, pixel-perfect + alpha toggles). F = fullscreen.
     Settings persist across refreshes.
     ================================================================ */
  const CONFIG = {
    clientId: "bgq2oi4x4ex5soyt4dmvc0jy9vrcuj",   // same Twitch app as the queue
    scopes: ["moderator:read:chatters"],          // needed to list who's in chat
    maxPlayers: 150,                              // physics stays smooth up to here
    ignore: ["nightbot", "streamelements", "streamlabs", "moobot",
             "sery_bot", "soundalerts", "fossabot", "wizebot"],
    slotValues: [100, 500, 1000, 5000, 10000, 5000, 1000, 500, 100],
    gameTimeout: 50,                              // seconds before stragglers are scored

    /* Real point payouts (optional).
       Twitch has NO public API for granting channel points to viewers,
       so automatic payouts go through StreamElements loyalty points.
       Fill both values in (see READ-ME-FIRST.txt) to enable; leave them
       empty and wins simply count on the leaderboard for fun.
       WARNING: the JWT is a secret — only fill it in on your LOCAL copy,
       never in a copy you publish (e.g. GitHub). */
    points: {
      streamElementsChannelId: "",   // Account ID from StreamElements dashboard
      streamElementsJWT: "",         // JWT token from StreamElements dashboard
      awardEveryone: false,          // false = winner only, true = every ball pays its slot
    },
  };

  const params   = new URLSearchParams(location.search);
  const DEMO     = params.get("demo") === "1";
  const AUTO     = params.get("auto") === "1";
  const REDIRECT = location.origin + location.pathname;
  const TOKEN_KEY = "plk:token";

  /* ---------- visual settings · live console + persisted ---------- */
  const VIS_KEY = "plk:visuals";
  const VIS_DEFAULT = { pix: 1, ballScale: 1, glow: 1, perfect: true, alpha: false, palette: 0, fxOpen: true };
  function loadVis(){ try { return { ...VIS_DEFAULT, ...(JSON.parse(localStorage.getItem(VIS_KEY)) || {}) }; } catch { return { ...VIS_DEFAULT }; } }
  function saveVis(){ try { localStorage.setItem(VIS_KEY, JSON.stringify(vis)); } catch {} }
  let vis = loadVis();
  // URL flags override stored settings on load.
  vis.pix = params.get("px") ? Math.max(1, Math.min(12, parseInt(params.get("px")) || 1)) : 1;  // locked to 1; slider removed
  if (params.get("alpha") === "1") vis.alpha = true;
  let PIX   = vis.pix;
  let ALPHA = vis.alpha;

  // Test/demo runs score on their own board so real stats stay clean.
  let testMode = false;
  const lbKey = () => (testMode ? "plk:leaderboard:test" : "plk:leaderboard");

  const canvas    = document.getElementById("board");
  const ctx       = canvas.getContext("2d");
  const statusEl  = document.getElementById("status");
  const gateEl    = document.getElementById("gate");
  const lineupEl  = document.getElementById("lineup");
  const controlsEl= document.getElementById("controls");
  const winnerEl  = document.getElementById("winner");
  const lbEl      = document.getElementById("lb");
  const lbToggle  = document.getElementById("lbToggle");
  const fxEl      = document.getElementById("fx");
  const fxToggle  = document.getElementById("fxToggle");

  /* ---------- indexed palettes · fixed roles: field / structure / mark ---------- */
  const PALETTES = [
    { name:"EMBER",    bg:"#140d00", blob:"#c05a00", dot:"#ffd27a", dim:"#6e4300" },
    { name:"PHOSPHOR", bg:"#06120a", blob:"#1f7a3d", dot:"#b6ff7a", dim:"#0d3d1f" },
    { name:"MONO",     bg:"#000000", blob:"#6e6e6e", dot:"#ffffff", dim:"#3a3a3a" },
    { name:"DMG",      bg:"#0f380f", blob:"#306230", dot:"#9bbc0f", dim:"#1e4a1e" },
    { name:"ICE",      bg:"#00121a", blob:"#1c6f8c", dot:"#7fdfff", dim:"#0a3646" },
    { name:"MAGMA",    bg:"#180008", blob:"#a01f3c", dot:"#ff8fae", dim:"#50101e" },
    { name:"PAPER",    bg:"#e8e4d8", blob:"#b7ac90", dot:"#151008", dim:"#a89d80" },
  ];
  let COL = { bg:"#140d00", blob:"#c05a00", dot:"#ffd27a", dim:"#6e4300" };
  function applyPalette(){
    const p = PALETTES[vis.palette] || PALETTES[0];
    COL = { bg:p.bg, blob:p.blob, dot:p.dot, dim:p.dim };
    const r = document.documentElement.style;
    r.setProperty("--bg", p.bg); r.setProperty("--blob", p.blob);
    r.setProperty("--dot", p.dot); r.setProperty("--dim", p.dim);
    // Letterbox margins (pixel-perfect mode) match the field, except when
    // ALPHA BG is on for OBS layering — then keep the page transparent.
    document.documentElement.style.background = vis.alpha ? "transparent" : p.bg;
  }
  const MONO = 'ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace';

  // Ball ring colors: accents drawn from the system's sibling palettes,
  // so multi-color content stays in-family. (Balls are content, not chrome.)
  const PALETTE = ["#ffd27a","#b6ff7a","#7fdfff","#ff8fae","#9bbc0f","#ffffff","#c05a00"];
  const colorFor = (name) => {
    let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return PALETTE[h % PALETTE.length];
  };
  const fmt = (n) => n.toLocaleString("en-US");

  /* ---------- Bayer 4x4 — the one falloff mechanism ---------- */
  const BM = [0,8,2,10,12,4,14,6,3,11,1,9,15,7,13,5];
  const bayer = (cx, cy, v) => v > (BM[(cy & 3) * 4 + (cx & 3)] + 0.5) / 16;

  // Dithered fill: hard on/off cells through the matrix, never alpha.
  function dithRect(x, y, w, h, v, color) {
    if (v <= 0.01) return;
    ctx.fillStyle = color;
    const cx0 = Math.max(0, Math.floor(x / PIX)), cy0 = Math.max(0, Math.floor(y / PIX));
    const cx1 = Math.floor((x + w) / PIX), cy1 = Math.floor((y + h) / PIX);
    for (let cy = cy0; cy < cy1; cy++)
      for (let cx = cx0; cx < cx1; cx++)
        if (bayer(cx, cy, v)) ctx.fillRect(cx * PIX, cy * PIX, PIX, PIX);
  }

  function setStatus(text, cls, hideAfter) {
    statusEl.style.display = "flex";
    statusEl.className = cls || "";
    statusEl.textContent = text.toUpperCase();
    clearTimeout(setStatus._t);
    if (hideAfter) setStatus._t = setTimeout(() => (statusEl.style.display = "none"), hideAfter);
  }

  /* ============================================================
     BOARD GEOMETRY — rebuilt on resize
     ============================================================ */
  let W = 0, H = 0;
  let pegs = [];          // {x, y, r, glow}
  let dividers = [];      // capsules {x1,y1,x2,y2,r}
  let slotW = 0, slotTop = 0;
  const SLOTS = CONFIG.slotValues.length;
  const slotFlash = new Array(SLOTS).fill(0);

  function rebuild() {
    const oldW = W, oldH = H;
    const iw = window.innerWidth, ih = window.innerHeight;

    if (vis.perfect) {
      // Snap to integer scaling: each grid cell maps to exactly PIX screen
      // pixels, so nearest-neighbor stays crisp with no uneven blocks. Any
      // leftover edge (< PIX px) is letterboxed and the canvas is centered.
      const cols = Math.max(1, Math.floor(iw / PIX));
      const rows = Math.max(1, Math.floor(ih / PIX));
      W = cols * PIX; H = rows * PIX;
      canvas.width = cols; canvas.height = rows;
      canvas.style.width = W + "px"; canvas.style.height = H + "px";
      canvas.style.left = Math.floor((iw - W) / 2) + "px";
      canvas.style.top  = Math.floor((ih - H) / 2) + "px";
    } else {
      // Stretch the low-res store to fill the viewport (may scale non-integer).
      W = iw; H = ih;
      canvas.width = Math.ceil(iw / PIX);
      canvas.height = Math.ceil(ih / PIX);
      canvas.style.width = "100%"; canvas.style.height = "100%";
      canvas.style.left = "0"; canvas.style.top = "0";
    }
    ctx.setTransform(1 / PIX, 0, 0, 1 / PIX, 0, 0);
    ctx.imageSmoothingEnabled = false;

    slotW = W / SLOTS;
    slotTop = H * 0.78;

    // Staggered peg field between 16% and 73% of the height.
    pegs = [];
    const pegR = Math.max(4, Math.min(9, W * 0.005));
    const rows = 11, cols = 13;
    const top = H * 0.16, bottom = H * 0.73;
    const sy = (bottom - top) / (rows - 1);
    const sx = W / cols;
    for (let i = 0; i < rows; i++) {
      const y = top + i * sy;
      const n = (i % 2 === 0) ? cols : cols - 1;
      const off = (i % 2 === 0) ? sx * 0.5 : sx;
      for (let k = 0; k < n; k++) {
        pegs.push({ x: off + k * sx, y, r: pegR, glow: 0 });
      }
    }

    // Slot dividers as vertical capsules.
    dividers = [];
    const dr = Math.max(3, W * 0.0025);
    for (let i = 1; i < SLOTS; i++) {
      dividers.push({ x1: i * slotW, y1: slotTop, x2: i * slotW, y2: H, r: dr });
    }

    // Scale existing balls into the new space.
    if (oldW && oldH) for (const b of balls) {
      b.x *= W / oldW; b.y *= H / oldH;
    }
  }
  window.addEventListener("resize", rebuild);

  /* ============================================================
     PHYSICS — circles vs pegs, walls, dividers and each other
     ============================================================ */
  const G_FACTOR = 1.9;         // gravity = height * this, px/s^2
  const AIR = 0.06;             // horizontal air drag per second
  const E_PEG = 0.55, E_WALL = 0.4, E_BALL = 0.25, E_FLOOR = 0.3;
  const SLEEP_V = 35, SLEEP_T = 0.5;
  const DT = 1 / 240;

  let balls = [];               // {player, x,y,vx,vy,r,ang,sprite,asleep,sleepT,stuckT,slot,score,settledAt}
  let confetti = [];

  function ballRadius(count) {
    const base = count <= 20 ? 22 : count <= 40 ? 18 : count <= 80 ? 15 : count <= 140 ? 12 : 10;
    return base * Math.max(0.6, Math.min(1.2, W / 1600)) * vis.ballScale;
  }

  function collideCircle(b, px, py, pr, e, isPeg, peg) {
    const dx = b.x - px, dy = b.y - py;
    const rr = b.r + pr;
    const d2 = dx * dx + dy * dy;
    if (d2 >= rr * rr) return;
    const d = Math.sqrt(d2) || 0.0001;
    const nx = dx / d, ny = dy / d;
    b.x = px + nx * rr; b.y = py + ny * rr;
    const vn = b.vx * nx + b.vy * ny;
    if (vn < 0) {
      b.vx -= (1 + e) * vn * nx;
      b.vy -= (1 + e) * vn * ny;
      // Tiny tangential kick on real impacts (not resting contact) so
      // balls never balance perfectly on a peg.
      if (Math.abs(vn) > 60) {
        const kick = (Math.random() - 0.5) * 30;
        b.vx += -ny * kick; b.vy += nx * kick;
      }
      if (isPeg && Math.abs(vn) > 25) peg.glow = 1;   // <- reactive peg
    }
  }

  function collideCapsule(b, c) {
    // Closest point on segment (x1,y1)-(x2,y2) to the ball.
    const ax = c.x1, ay = c.y1, bx = c.x2, by = c.y2;
    const abx = bx - ax, aby = by - ay;
    const t = Math.max(0, Math.min(1,
      ((b.x - ax) * abx + (b.y - ay) * aby) / (abx * abx + aby * aby)));
    collideCircle(b, ax + abx * t, ay + aby * t, c.r, E_WALL, false);
  }

  function step(dt) {
    const G = H * G_FACTOR;

    for (const b of balls) {
      if (b.asleep) continue;
      b.vy += G * dt;
      b.vx *= 1 - AIR * dt;
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.ang += (b.vx / b.r) * dt * 0.7;

      // Walls + floor
      if (b.x < b.r)      { b.x = b.r;      if (b.vx < 0) b.vx = -b.vx * E_WALL; }
      if (b.x > W - b.r)  { b.x = W - b.r;  if (b.vx > 0) b.vx = -b.vx * E_WALL; }
      if (b.y > H - b.r)  { b.y = H - b.r;  if (b.vy > 0) b.vy = -b.vy * E_FLOOR; b.vx *= 0.92; }

      // Pegs (only test nearby rows — pegs are sorted top to bottom)
      for (const p of pegs) {
        if (Math.abs(p.y - b.y) > b.r + p.r + 2) continue;
        collideCircle(b, p.x, p.y, p.r, E_PEG, true, p);
      }
      for (const c of dividers) {
        if (b.y > c.y1 - b.r - c.r - 4) collideCapsule(b, c);
      }
    }

    // Ball <-> ball via a coarse spatial hash.
    const cell = Math.max(24, ballRadius(balls.length) * 4);
    const grid = new Map();
    for (let i = 0; i < balls.length; i++) {
      const b = balls[i];
      const key = Math.floor(b.x / cell) + 4096 * Math.floor(b.y / cell);
      if (!grid.has(key)) grid.set(key, []);
      grid.get(key).push(i);
    }
    for (const b of balls) {
      if (b.asleep) continue;
      const cx = Math.floor(b.x / cell), cy = Math.floor(b.y / cell);
      for (let ox = -1; ox <= 1; ox++) for (let oy = -1; oy <= 1; oy++) {
        const bucket = grid.get(cx + ox + 4096 * (cy + oy));
        if (!bucket) continue;
        for (const j of bucket) {
          const o = balls[j];
          if (o === b) continue;
          const dx = b.x - o.x, dy = b.y - o.y, rr = b.r + o.r;
          const d2 = dx * dx + dy * dy;
          if (d2 >= rr * rr || d2 === 0) continue;
          const d = Math.sqrt(d2), nx = dx / d, ny = dy / d, over = rr - d;
          if (o.asleep) {                     // settled balls act as terrain
            b.x += nx * over; b.y += ny * over;
            const vn = b.vx * nx + b.vy * ny;
            if (vn < 0) { b.vx -= (1 + E_BALL) * vn * nx; b.vy -= (1 + E_BALL) * vn * ny; }
          } else {
            b.x += nx * over * 0.5; b.y += ny * over * 0.5;
            o.x -= nx * over * 0.5; o.y -= ny * over * 0.5;
            const rvx = b.vx - o.vx, rvy = b.vy - o.vy;
            const vn = rvx * nx + rvy * ny;
            if (vn < 0) {
              const jimp = -(1 + E_BALL) * vn / 2;
              b.vx += jimp * nx; b.vy += jimp * ny;
              o.vx -= jimp * nx; o.vy -= jimp * ny;
            }
          }
        }
      }
    }

    // Settling + anti-stuck
    for (const b of balls) {
      if (b.asleep) continue;
      const speed = Math.hypot(b.vx, b.vy);
      if (b.y > slotTop && speed < SLEEP_V) {
        b.sleepT += dt;
        if (b.sleepT > SLEEP_T) settle(b);
      } else {
        b.sleepT = 0;
      }
      // Wedged above the slots (e.g. in the wall/peg pocket)? Kick it
      // loose toward the middle of the board so it can't re-lodge.
      if (b.y <= slotTop && speed < 60) {
        b.stuckT += dt;
        if (b.stuckT > 1.2) {
          const dir = b.x < W / 2 ? 1 : -1;
          b.vx += dir * (150 + Math.random() * 250);
          b.vy -= 150 + Math.random() * 100;
          b.stuckT = 0;
        }
      } else {
        b.stuckT = 0;
      }
    }
  }

  function settle(b) {
    b.asleep = true; b.vx = 0; b.vy = 0; b.sleepT = 0;
    b.slot = Math.max(0, Math.min(SLOTS - 1, Math.floor(b.x / slotW)));
    b.score = CONFIG.slotValues[b.slot];
    b.settledAt = performance.now();
    slotFlash[b.slot] = 1;
  }

  /* ============================================================
     RENDERING — per cell, priority DOT > BLOB > FIELD, no blends
     ============================================================ */
  let running = false, gameStart = 0, lastFrame = 0, acc = 0;

  function draw(dt) {
    ctx.clearRect(0, 0, W + PIX, H + PIX);
    if (!ALPHA) { ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W + PIX, H + PIX); }

    // Slot area: dithered heat field + hairline structure
    const maxV = Math.max(...CONFIG.slotValues);
    for (let i = 0; i < SLOTS; i++) {
      const heat = CONFIG.slotValues[i] / maxV;
      dithRect(i * slotW, slotTop, slotW, H - slotTop, 0.04 + heat * 0.10, COL.blob);
      if (slotFlash[i] > 0.02) {
        dithRect(i * slotW, slotTop, slotW, H - slotTop, slotFlash[i] * 0.7, COL.dot);
      }
      slotFlash[i] = Math.max(0, slotFlash[i] - dt / 0.6);

      ctx.fillStyle = heat === 1 ? COL.dot : heat >= 0.5 ? COL.blob : COL.dim;
      // Sized against the pixel grid so digits stay legible when chunky.
      ctx.font = "700 " + Math.max(PIX * 7, Math.round(slotW * 0.13)) + "px " + MONO;
      ctx.textAlign = "center"; ctx.textBaseline = "bottom";
      ctx.fillText(fmt(CONFIG.slotValues[i]), i * slotW + slotW / 2, H - 6);
    }

    // Hairline rule across the top of the slot area
    ctx.fillStyle = COL.dim;
    ctx.fillRect(0, slotTop, W, PIX);

    // Dividers: solid structure bars (secondary role)
    ctx.fillStyle = COL.blob;
    for (const c of dividers) {
      ctx.fillRect(c.x1 - c.r, c.y1, c.r * 2, c.y2 - c.y1);
    }

    // Pegs — hit flash: solid accent core + Bayer-dithered halo that
    // thins out as it decays. No alpha, no blur: dither IS the fade.
    for (const p of pegs) {
      const g = p.glow;
      if (g > 0.01 && vis.glow > 0.01) {
        const R = p.r + 3 + 14 * g * vis.glow;
        const cx0 = Math.floor((p.x - R) / PIX), cx1 = Math.ceil((p.x + R) / PIX);
        const cy0 = Math.floor((p.y - R) / PIX), cy1 = Math.ceil((p.y + R) / PIX);
        ctx.fillStyle = COL.dot;
        for (let cy = cy0; cy <= cy1; cy++) {
          for (let cx = cx0; cx <= cx1; cx++) {
            const px = cx * PIX + PIX / 2, py = cy * PIX + PIX / 2;
            const d = Math.hypot(px - p.x, py - p.y);
            if (d > R || d <= p.r) continue;
            if (bayer(cx, cy, g * vis.glow * (1 - d / R))) ctx.fillRect(cx * PIX, cy * PIX, PIX, PIX);
          }
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.glow = Math.max(0, g - dt / 0.9);
      } else {
        ctx.fillStyle = COL.blob;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        if (g > 0) p.glow = Math.max(0, g - dt / 0.9);   // keep decaying when glow is off
      }
    }

    // Balls (pre-rendered low-res avatar sprites — content reads on top)
    for (const b of balls) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.ang);
      ctx.drawImage(b.sprite, -b.r, -b.r, b.r * 2, b.r * 2);
      ctx.restore();
    }

    // Confetti: hard palette squares, dither-faded by remaining life
    for (let i = confetti.length - 1; i >= 0; i--) {
      const c = confetti[i];
      c.vy += 900 * dt; c.x += c.vx * dt; c.y += c.vy * dt;
      c.life -= dt;
      if (c.life <= 0 || c.y > H + 20) { confetti.splice(i, 1); continue; }
      const cx = Math.floor(c.x / PIX), cy = Math.floor(c.y / PIX);
      if (!bayer(cx, cy, Math.min(1, c.life))) continue;
      ctx.fillStyle = c.color;
      ctx.fillRect(cx * PIX, cy * PIX, PIX * 2, PIX * 2);
    }
  }

  function frame(t) {
    const dt = Math.min(1 / 30, (t - lastFrame) / 1000 || 0);
    lastFrame = t;

    if (running) {
      acc += dt;
      while (acc > DT) { step(DT); acc -= DT; }

      const allDone = balls.length > 0 && balls.every((b) => b.asleep);
      const timedOut = (t - gameStart) / 1000 > CONFIG.gameTimeout;
      if (allDone || (timedOut && balls.length > 0)) {
        if (timedOut) for (const b of balls) if (!b.asleep) settle(b);
        running = false;
        finishGame();
      }
    }

    draw(dt);
    requestAnimationFrame(frame);
  }

  /* ============================================================
     AVATAR SPRITES — rendered at grid resolution, scaled jagged
     ============================================================ */
  function makeSprite(img, name, r, color) {
    const col = color || colorFor(name);
    const size = Math.max(8, Math.round((r * 2) / PIX));   // low-res backing
    const c = document.createElement("canvas");
    c.width = size; c.height = size;
    const g = c.getContext("2d");
    g.imageSmoothingEnabled = false;
    const cx = size / 2;

    g.save();
    g.beginPath(); g.arc(cx, cx, cx - 1, 0, Math.PI * 2); g.clip();
    if (img) {
      g.drawImage(img, 0, 0, size, size);
    } else {
      g.fillStyle = col; g.fillRect(0, 0, size, size);
      g.fillStyle = COL.bg;
      g.font = "700 " + Math.ceil(size * 0.42) + "px " + MONO;
      g.textAlign = "center"; g.textBaseline = "middle";
      g.fillText(name.slice(0, 2).toUpperCase(), cx, cx + 1);
    }
    g.restore();

    g.strokeStyle = col;
    g.lineWidth = 1.5;
    g.beginPath(); g.arc(cx, cx, cx - 1, 0, Math.PI * 2); g.stroke();
    return c;
  }

  // Numbered, color-coded avatar for test runs (also used as the <img> src).
  function numberAvatar(num, color) {
    const s = 32;                     // small on purpose — pixel identity
    const c = document.createElement("canvas");
    c.width = s; c.height = s;
    const g = c.getContext("2d");
    g.imageSmoothingEnabled = false;
    g.fillStyle = color;
    g.beginPath(); g.arc(s / 2, s / 2, s / 2, 0, Math.PI * 2); g.fill();
    g.fillStyle = COL.bg;
    g.font = "700 " + (num >= 100 ? 11 : num >= 10 ? 14 : 17) + "px " + MONO;
    g.textAlign = "center"; g.textBaseline = "middle";
    g.fillText(num, s / 2, s / 2 + 1);
    return c.toDataURL();
  }

  function testPlayers(n) {
    return Array.from({ length: n }, (_, i) => {
      const color = PALETTE[i % PALETTE.length];
      return { login: "test-" + (i + 1), name: "#" + (i + 1), color,
               avatar: numberAvatar(i + 1, color), img: null };
    });
  }

  function loadImage(url) {
    return new Promise((resolve) => {
      if (!url) return resolve(null);
      const img = new Image();
      img.crossOrigin = "anonymous";
      const to = setTimeout(() => resolve(null), 6000);
      img.onload = () => { clearTimeout(to); resolve(img); };
      img.onerror = () => { clearTimeout(to); resolve(null); };
      img.src = url;
    });
  }

  /* ============================================================
     GAME FLOW
     ============================================================ */
  let players = [];   // {login, name, avatar(url), img(Image|null), color?}
  let phase = "boot"; // boot | idle | gathering | ready | running | done
  let testCount = 20;

  function setButtons(list, withTest) {
    controlsEl.innerHTML = "";
    for (const [label, cls, fn, disabled] of list) {
      const b = document.createElement("button");
      b.className = "btn " + (cls || "");
      b.textContent = label;
      b.disabled = !!disabled;
      b.onclick = fn;
      controlsEl.appendChild(b);
    }
    if (withTest) controlsEl.appendChild(testControls());
  }

  // Number box + play button for test runs with numbered balls.
  function testControls() {
    const wrap = document.createElement("div");
    wrap.className = "testwrap";
    const inp = document.createElement("input");
    inp.type = "number"; inp.min = 2; inp.max = CONFIG.maxPlayers; inp.value = testCount;
    inp.title = "Number of test balls";
    inp.onchange = () => {
      testCount = Math.max(2, Math.min(CONFIG.maxPlayers, parseInt(inp.value) || 20));
      inp.value = testCount;
    };
    const btn = document.createElement("button");
    btn.className = "btn ghost";
    btn.textContent = "▶ TEST RUN";
    btn.onclick = testRun;
    wrap.append(inp, btn);
    return wrap;
  }

  function idleButtons() {
    setButtons(auth || DEMO ? [["GATHER CHATTERS", "on", gather]] : [], true);
    if (!auth && !DEMO) gateEl.style.display = "";   // still show the connect gate
  }

  async function testRun() {
    if (phase === "running" || phase === "gathering") return;
    testMode = true;
    gateEl.style.display = "none";
    players = testPlayers(testCount);
    await Promise.all(players.map(async (p) => { p.img = await loadImage(p.avatar); }));
    drop();
  }

  function showLineup() {
    const faces = lineupEl.querySelector(".faces");
    faces.innerHTML = "";
    const shown = players.slice(0, 40);
    for (const p of shown) {
      const im = document.createElement("img");
      if (p.avatar) im.src = p.avatar;      // no src at all -> no broken glyph
      im.title = p.name;
      im.style.borderColor = p.color || colorFor(p.name);
      if (!p.avatar) im.style.background = p.color || colorFor(p.name);
      faces.appendChild(im);
    }
    lineupEl.querySelector(".count").textContent =
      (players.length + " PLAYER" + (players.length === 1 ? "" : "S") +
      (players.length > shown.length ? " (+" + (players.length - shown.length) + ")" : "") +
      " READY");
    lineupEl.style.display = "flex";
  }

  async function gather() {
    phase = "gathering";
    testMode = DEMO;                 // demo runs score on the test board
    winnerEl.classList.remove("show");
    hideLeaderboard();
    setButtons([["GATHERING…", "", () => {}, true]]);
    setStatus("gathering chatters…", "");

    try {
      players = DEMO ? demoPlayers() : await fetchPlayers();
    } catch (err) {
      console.error(err);
      setStatus("couldn't fetch chatters — see console", "err");
      phase = "idle";
      idleButtons();
      return;
    }

    if (players.length === 0) {
      setStatus("no one in chat yet!", "err", 4000);
      phase = "idle";
      idleButtons();
      return;
    }

    setStatus("loading avatars…", "");
    await Promise.all(players.map(async (p) => { p.img = await loadImage(p.avatar); }));

    showLineup();
    setStatus("ready", "", 2500);
    phase = "ready";
    setButtons([
      ["DROP", "on", drop],
      ["REGATHER", "ghost", gather],
    ], true);
    if (AUTO) drop();
  }

  function drop() {
    phase = "running";
    lineupEl.style.display = "none";
    winnerEl.classList.remove("show");
    hideLeaderboard();
    setButtons([]);

    const r = ballRadius(players.length);
    balls = players.map((p, i) => ({
      player: p,
      x: W / 2 + (Math.random() - 0.5) * W * 0.55,
      y: -r - Math.random() * 80 - i * (r * 1.1),   // staggered entry column
      vx: (Math.random() - 0.5) * 120,
      vy: 0,
      r,
      ang: 0,
      sprite: makeSprite(p.img, p.name, r, p.color),
      asleep: false, sleepT: 0, stuckT: 0,
      slot: -1, score: 0, settledAt: 0,
    }));

    running = true;
    acc = 0;
    gameStart = performance.now();
  }

  function finishGame() {
    phase = "done";

    // Winner: highest slot value, earliest to land breaks ties.
    const sorted = [...balls].sort((a, b) => b.score - a.score || a.settledAt - b.settledAt);
    const win = sorted[0];

    // Announce (initials sprite stands in when there's no profile picture)
    const img = winnerEl.querySelector("img");
    img.src = win.player.avatar ||
      makeSprite(win.player.img, win.player.name, 24, win.player.color).toDataURL();
    img.style.background = win.player.color || colorFor(win.player.name);
    img.style.borderColor = win.player.color || colorFor(win.player.name);
    winnerEl.querySelector(".wname").textContent = win.player.name;
    const ptsEl = winnerEl.querySelector(".wpts");
    ptsEl.textContent = fmt(win.score) + " PTS";
    winnerEl.querySelector(".wsub").textContent = testMode ? "TEST RUN CHAMPION" : "PLINKO CHAMPION";
    winnerEl.classList.add("show");
    setTimeout(() => winnerEl.classList.remove("show"), 8000);

    // Real payout (StreamElements), if configured. Otherwise glory only.
    awardPoints(win).then((paid) => {
      if (paid) ptsEl.textContent = "+" + fmt(win.score) + " PTS PAID OUT";
    });

    // Confetti from the top and from the winning ball — indexed colors.
    for (let i = 0; i < 160; i++) {
      const fromBall = i % 2 === 0;
      confetti.push({
        x: fromBall ? win.x : W * (0.2 + Math.random() * 0.6),
        y: fromBall ? win.y : -10,
        vx: (Math.random() - 0.5) * (fromBall ? 700 : 200),
        vy: fromBall ? -300 - Math.random() * 500 : 50 + Math.random() * 100,
        color: i % 3 === 0 ? COL.blob : COL.dot,
        life: 2.5 + Math.random() * 1.5,
      });
    }

    updateLeaderboard(win);
    showLeaderboard();

    const btns = [];
    if (auth || DEMO) btns.push(["PLAY AGAIN", "on", gather]);
    btns.push(["CLEAR BOARD", "ghost", () => {
      balls = []; hideLeaderboard(); phase = "idle"; idleButtons();
    }]);
    setButtons(btns, true);
  }

  /* ============================================================
     PAYOUTS — StreamElements loyalty points (Twitch has no API
     for granting channel points, so this is the real-money path)
     ============================================================ */
  async function awardPoints(win) {
    const P = CONFIG.points;
    if (testMode || !P.streamElementsChannelId || !P.streamElementsJWT) return false;
    const targets = P.awardEveryone ? balls : [win];
    try {
      for (const b of targets) {
        const r = await fetch("https://api.streamelements.com/kappa/v2/points/"
            + P.streamElementsChannelId + "/"
            + encodeURIComponent(b.player.login) + "/" + b.score,
          { method: "PUT", headers: { Authorization: "Bearer " + P.streamElementsJWT } });
        if (!r.ok) throw new Error("StreamElements " + r.status + ": " + (await r.text()));
      }
      setStatus("points paid out", "", 5000);
      return true;
    } catch (err) {
      console.error("Point payout failed:", err);
      setStatus("point payout failed — see console", "err", 6000);
      return false;
    }
  }

  /* ============================================================
     LEADERBOARD (persists in localStorage across streams)
     ============================================================ */
  function loadLB() { try { return JSON.parse(localStorage.getItem(lbKey())) || {}; } catch { return {}; } }
  function saveLB(lb) { try { localStorage.setItem(lbKey(), JSON.stringify(lb)); } catch {} }

  function updateLeaderboard(winnerBall) {
    const lb = loadLB();
    for (const b of balls) {
      const key = b.player.login;
      const rec = lb[key] || { name: b.player.name, avatar: b.player.avatar, wins: 0, points: 0, games: 0 };
      rec.name = b.player.name; rec.avatar = b.player.avatar;   // keep fresh
      rec.color = b.player.color || null;
      rec.points += b.score;
      rec.games += 1;
      if (b === winnerBall) rec.wins += 1;
      lb[key] = rec;
    }
    saveLB(lb);
  }

  function renderLeaderboard() {
    const lb = loadLB();
    const rows = Object.values(lb)
      .sort((a, b) => b.wins - a.wins || b.points - a.points)
      .slice(0, 10);

    lbEl.innerHTML =
      '<div class="strip"><span class="sq"></span>' +
      (testMode ? "TEST LEADERBOARD" : "LEADERBOARD") +
      '</div><div class="rows"></div>';
    const rowsEl = lbEl.querySelector(".rows");

    if (rows.length === 0) {
      rowsEl.insertAdjacentHTML("beforeend", '<div class="none">NO GAMES PLAYED YET.</div>');
    }
    rows.forEach((r, i) => {
      const row = document.createElement("div");
      row.className = "row";
      const im = document.createElement("img");
      if (r.avatar) im.src = r.avatar;      // no src at all -> no broken glyph
      im.style.background = r.color || colorFor(r.name);
      const nm = document.createElement("span"); nm.className = "nm"; nm.textContent = r.name;
      nm.style.color = r.color || colorFor(r.name);
      const wins = document.createElement("span"); wins.className = "wins";
      wins.textContent = r.wins + "W";
      const pts = document.createElement("span"); pts.className = "pts"; pts.textContent = fmt(r.points);
      const rank = document.createElement("span"); rank.className = "rank";
      rank.textContent = String(i + 1).padStart(2, "0");
      row.append(rank, im, nm, wins, pts);
      rowsEl.appendChild(row);
    });

    // Reset (two clicks: arm, then confirm — no popups inside OBS)
    const foot = document.createElement("div");
    foot.className = "foot";
    const reset = document.createElement("button");
    reset.className = "btn ghost lbreset";
    reset.textContent = "RESET LEADERBOARD";
    let armTimer = null;
    reset.onclick = () => {
      if (!reset.classList.contains("arm")) {
        reset.classList.add("arm");
        reset.textContent = "CLICK AGAIN TO ERASE";
        armTimer = setTimeout(() => {
          reset.classList.remove("arm");
          reset.textContent = "RESET LEADERBOARD";
        }, 3000);
        return;
      }
      clearTimeout(armTimer);
      try { localStorage.removeItem(lbKey()); } catch {}
      renderLeaderboard();
    };
    foot.appendChild(reset);
    lbEl.appendChild(foot);
  }

  function showLeaderboard() {
    renderLeaderboard();
    lbEl.classList.add("show");
  }
  function hideLeaderboard() {
    lbEl.classList.remove("show");
  }
  lbToggle.onclick = () => (lbEl.classList.contains("show") ? hideLeaderboard() : showLeaderboard());

  /* ============================================================
     TWITCH — OAuth (implicit flow) + chatters + profile pictures
     ============================================================ */
  let auth = null;   // { token, userId, login }

  async function fetchPlayers() {
    const headers = { "Client-Id": CONFIG.clientId, Authorization: "Bearer " + auth.token };

    // 1) Everyone currently in chat.
    let chatters = [], cursor = null;
    do {
      const u = new URL("https://api.twitch.tv/helix/chat/chatters");
      u.searchParams.set("broadcaster_id", auth.userId);
      u.searchParams.set("moderator_id", auth.userId);
      u.searchParams.set("first", "1000");
      if (cursor) u.searchParams.set("after", cursor);
      const r = await fetch(u, { headers });
      if (!r.ok) throw new Error("chatters " + r.status + ": " + (await r.text()));
      const j = await r.json();
      chatters = chatters.concat(j.data);
      cursor = j.pagination && j.pagination.cursor;
    } while (cursor && chatters.length < CONFIG.maxPlayers);

    chatters = chatters
      .filter((c) => !CONFIG.ignore.includes(c.user_login.toLowerCase()))
      .slice(0, CONFIG.maxPlayers);

    // 2) Profile pictures, 100 users per request.
    const byId = new Map();
    for (let i = 0; i < chatters.length; i += 100) {
      const u = new URL("https://api.twitch.tv/helix/users");
      for (const c of chatters.slice(i, i + 100)) u.searchParams.append("id", c.user_id);
      const r = await fetch(u, { headers });
      if (!r.ok) throw new Error("users " + r.status);
      for (const usr of (await r.json()).data) byId.set(usr.id, usr);
    }

    return chatters.map((c) => {
      const usr = byId.get(c.user_id);
      return {
        login: c.user_login,
        name: c.user_name || c.user_login,
        avatar: usr ? usr.profile_image_url.replace("300x300", "150x150") : "",
        img: null,
      };
    });
  }

  function demoPlayers() {
    const names = ["PixelWizard","NightOwl_42","GlitchQueen","TurboSnail","LoafOfBread","xX_Slayer_Xx",
      "CozyRaccoon","ByteMe2","QuantumDuck","SirLagsALot","MoonMoth","CtrlAltDefeat","NoScopeNana",
      "PogChampion","SleepyKoala","VoidWalker","CheeseLord","RGBGoblin","AFKForever","TeapotTempest",
      "BasementDweller","StarFisher","GrumpyCloud","MechaPigeon","SaltMiner","DiceGoblin","LurkerPrime",
      "HypeTrainCond","BitBandit","EmoteSpammer","ChatGremlin","VODWatcher","ModHammer","SubGifter9000",
      "KappaKeeper","JukeboxHero","PatchNotes","RespawnQueen","OneMoreGame","TiltedTom"];
    const n = Math.max(2, Math.min(CONFIG.maxPlayers, parseInt(params.get("count")) || 30));
    return Array.from({ length: n }, (_, i) => {
      const name = names[i % names.length] + (i >= names.length ? "_" + i : "");
      return { login: name.toLowerCase(), name, avatar: "", img: null };
    });
  }

  /* ============================================================
     VISUALS CONSOLE — live sliders/toggles (press H). Everything
     persists in localStorage so it survives OBS/browser refreshes.
     ============================================================ */
  function regenSprites() {
    for (const b of balls) b.sprite = makeSprite(b.player.img, b.player.name, b.r, b.player.color);
  }

  function toggleFx(force) {
    const show = force === undefined ? !fxEl.classList.contains("show") : force;
    fxEl.classList.toggle("show", show);
    fxToggle.style.display = show ? "none" : "";
    vis.fxOpen = show; saveVis();   // remember across refreshes (e.g. hidden for OBS)
  }

  function buildFx() {
    fxEl.innerHTML =
      '<div class="strip"><span class="sq"></span>VISUALS<button class="x" title="Hide (H)">×</button></div>' +
      '<div class="grp">RENDER</div>' +
      '<div class="ctl" data-c="ballScale"><div class="lr"><span>BALL SIZE</span><span class="val"></span></div>' +
        '<input type="range" min="0.5" max="1.5" step="0.05"></div>' +
      '<div class="ctl" data-c="glow"><div class="lr"><span>PEG GLOW</span><span class="val"></span></div>' +
        '<input type="range" min="0" max="1.5" step="0.05"></div>' +
      '<div class="togglerow">' +
        '<button class="btn" data-t="perfect">PIXEL-PERFECT</button>' +
        '<button class="btn" data-t="alpha">ALPHA BG</button>' +
      '</div>' +
      '<div class="grp">PALETTE</div>' +
      '<div class="pals"></div>' +
      '<div class="foot"><span class="hint">H HIDE · F FULL</span><button class="btn" data-reset>RESET</button></div>';

    const fmtVal = { pix: v => String(v), ballScale: v => "×" + v.toFixed(2), glow: v => Math.round(v * 100) + "%" };
    fxEl.querySelectorAll(".ctl").forEach(row => {
      const key = row.dataset.c;
      const rng = row.querySelector("input");
      const val = row.querySelector(".val");
      rng.value = vis[key];
      val.textContent = fmtVal[key](vis[key]);
      rng.oninput = () => {
        vis[key] = parseFloat(rng.value);
        val.textContent = fmtVal[key](vis[key]);
        saveVis();
        // Pixel size changes the grid + sprite resolution -> rebuild & re-render.
        // Ball size takes effect on the next drop; glow is read live each frame.
        if (key === "pix") { PIX = vis.pix; rebuild(); regenSprites(); }
      };
    });

    fxEl.querySelectorAll(".togglerow .btn").forEach(btn => {
      const key = btn.dataset.t;
      btn.classList.toggle("on", !!vis[key]);
      btn.onclick = () => {
        vis[key] = !vis[key];
        btn.classList.toggle("on", vis[key]);
        saveVis();
        if (key === "alpha") { ALPHA = vis.alpha; applyPalette(); }
        if (key === "perfect") rebuild();
      };
    });

    const pals = fxEl.querySelector(".pals");
    PALETTES.forEach((p, i) => {
      const cell = document.createElement("div");
      cell.className = "palc" + (i === vis.palette ? " sel" : "");
      cell.title = p.name;
      cell.innerHTML =
        '<span style="background:' + p.bg + '"></span>' +
        '<span style="background:' + p.blob + '"></span>' +
        '<span style="background:' + p.dot + '"></span>';
      cell.onclick = () => {
        vis.palette = i; saveVis(); applyPalette();
        pals.querySelectorAll(".palc").forEach((e, j) => e.classList.toggle("sel", j === i));
      };
      pals.appendChild(cell);
    });

    fxEl.querySelector(".x").onclick = () => toggleFx(false);
    fxEl.querySelector("[data-reset]").onclick = () => {
      const wasOpen = vis.fxOpen;
      vis = { ...VIS_DEFAULT, fxOpen: wasOpen }; saveVis();
      PIX = vis.pix; ALPHA = vis.alpha;
      applyPalette(); buildFx(); rebuild(); regenSprites();
    };
    fxToggle.onclick = () => toggleFx(true);

    toggleFx(vis.fxOpen !== false);   // deterministic initial state (default open)
  }

  function installHotkeys() {
    window.addEventListener("keydown", (e) => {
      const tag = e.target && e.target.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return;
      const k = e.key.toLowerCase();
      if (k === "h") { toggleFx(); e.preventDefault(); }
      else if (k === "f") {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
        else document.exitFullscreen && document.exitFullscreen();
      }
    });
  }

  async function boot() {
    applyPalette();
    buildFx();
    installHotkeys();
    rebuild();
    requestAnimationFrame(frame);

    if (DEMO) {
      setStatus("DEMO MODE", "");
      phase = "idle";
      gather();
      return;
    }

    // Capture token returned in the URL fragment after the Twitch redirect.
    if (location.hash.includes("access_token")) {
      const h = new URLSearchParams(location.hash.slice(1));
      const tok = h.get("access_token");
      if (tok && h.get("state") === sessionStorage.getItem("plk:state")) {
        localStorage.setItem(TOKEN_KEY, tok);
      }
      history.replaceState(null, "", REDIRECT + location.search);
    }

    if (!CONFIG.clientId) { showGate("no-client"); return; }
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) { showGate("connect"); phase = "idle"; idleButtons(); return; }

    try {
      const r = await fetch("https://id.twitch.tv/oauth2/validate", {
        headers: { Authorization: "OAuth " + token },
      });
      if (!r.ok) throw new Error("invalid");
      const me = await r.json();
      auth = { token, userId: me.user_id, login: me.login };
    } catch {
      localStorage.removeItem(TOKEN_KEY);
      showGate("connect", "Session expired — reconnect.");
      phase = "idle"; idleButtons();
      return;
    }

    gateEl.style.display = "none";
    setStatus(auth.login, "", 3000);
    phase = "idle";
    idleButtons();
    if (AUTO) gather();
  }

  function showGate(mode, note) {
    gateEl.style.display = "";
    if (mode === "no-client") {
      gateEl.innerHTML =
        '<div class="strip"><span class="sq"></span>SETUP REQUIRED</div>' +
        '<div class="inner">' +
        '<p>Add your Twitch <strong>Client ID</strong> to <code>CONFIG.clientId</code> in this file, ' +
        'and register this redirect URL on your Twitch app:</p>' +
        '<p><code>' + REDIRECT + '</code></p></div>';
      return;
    }
    gateEl.innerHTML =
      '<div class="strip"><span class="sq"></span>CONNECT TWITCH</div>' +
      '<div class="inner">' +
      '<p>' + (note || "Authorize once so Plinko can see who's in chat and grab their profile pictures.") + '</p>' +
      '<p>Make sure <code>' + REDIRECT + '</code> is registered as an OAuth Redirect URL on your Twitch app.</p>' +
      '</div>';
    const btn = document.createElement("button");
    btn.className = "btn on";
    btn.textContent = "CONNECT TWITCH";
    btn.onclick = login;
    btn.style.margin = "0 12px 14px";
    gateEl.appendChild(btn);
  }

  function login() {
    const state = Math.random().toString(36).slice(2);
    sessionStorage.setItem("plk:state", state);
    location.href = "https://id.twitch.tv/oauth2/authorize"
      + "?response_type=token"
      + "&client_id=" + encodeURIComponent(CONFIG.clientId)
      + "&redirect_uri=" + encodeURIComponent(REDIRECT)
      + "&scope=" + encodeURIComponent(CONFIG.scopes.join(" "))
      + "&state=" + state;
  }

  boot();
  </script>
