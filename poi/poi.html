<title>RANDOM POI — 1-BIT FIELD SYSTEM</title>
<link rel="stylesheet" href="../shared/field.css">
<style>
  /* ---------- element-specific chrome ---------- */
  #readout{
    position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:20;
    min-width:240px; max-width:min(90vw,620px);
  }
  #readout .strip .mapname{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #readout .body{ padding:12px 20px 14px; text-align:center; }
  #readout .poi{
    font-family:var(--pix); font-weight:700; font-size:22px; letter-spacing:1px;
    line-height:1.2; word-break:break-word;
  }
  #readout .poi.spin{ color:var(--blob); }

  #controls{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:20;
  }

  /* ---------- map picker overlay ---------- */
  #picker{
    position:fixed; inset:0; z-index:35; display:none;
    align-items:center; justify-content:center; background:rgba(0,0,0,.45);
  }
  #picker.show{ display:flex; }
  #picker .pk-panel{ background:var(--bg); border:1px solid var(--dot); width:min(92vw,560px); }
  #picker .pk-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px; }
  .pk-tile{
    background:var(--bg); border:1px solid var(--dim); color:var(--dot); cursor:pointer;
    padding:8px; display:flex; flex-direction:column; align-items:center; gap:6px;
    font-family:var(--pix);
  }
  .pk-tile:hover{ border-color:var(--dot); }
  .pk-tile.sel{ border-color:var(--dot); outline:1px solid var(--dot); outline-offset:-3px; }
  .pk-tile canvas{ width:100%; height:auto; image-rendering:pixelated; border:1px solid var(--dim); background:var(--bg); }
  .pk-nm{ font-size:11px; letter-spacing:1px; text-align:center; }
  .pk-ct{ font-family:var(--mono); font-size:10px; color:var(--blob); }
</style>
</head>

  const mapKeys = Object.keys(MAPS);
  const params = new URLSearchParams(location.search);

  const readoutEl = document.getElementById("readout");
  const controlsEl = document.getElementById("controls");
  const pickerEl = document.getElementById("picker");

  let state = "select";                 // select | ready | spinning | landed
  let current = 0, result = -1;
  let spinStart = 0, spinDur = 0, spinSteps = 0, spinTarget = 0;
  let T = { s:1, ox:0, oy:0 };

  const curMap = () => MAPS[mapKeys[Field.vis.map]];
  const realOutline = (m) => m.outline.filter(sp => sp.length >= 8);
  const tx = (x) => T.ox + x * T.s;
  const ty = (y) => T.oy + y * T.s;

  function bbox(m){
    let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;
    const acc=(x,y)=>{ if(x<mnx)mnx=x; if(y<mny)mny=y; if(x>mxx)mxx=x; if(y>mxy)mxy=y; };
    for(const p of m.pois) acc(p.x,p.y);
    for(const sp of realOutline(m)) for(const [x,y] of sp) acc(x,y);
    return { mnx,mny,mxx,mxy, w:mxx-mnx, h:mxy-mny };
  }

  function fit(){
    const m = curMap(), b = bbox(m);
    const mTop = Field.H*0.15, mBot = Field.H*0.17, mX = Field.W*0.07;
    const availW = Field.W - 2*mX, availH = Field.H - mTop - mBot;
    const s = Math.min(availW/b.w, availH/b.h);
    T = { s, ox: mX + (availW - b.w*s)/2 - b.mnx*s, oy: mTop + (availH - b.h*s)/2 - b.mny*s };
  }

  function drawOutline(ctx, m, mapx, mapy, col, lw){
    ctx.strokeStyle = col; ctx.lineWidth = lw;
    for(const sp of realOutline(m)){
      ctx.beginPath();
      ctx.moveTo(mapx(sp[0][0]), mapy(sp[0][1]));
      for(let i=1;i<sp.length;i++) ctx.lineTo(mapx(sp[i][0]), mapy(sp[i][1]));
      ctx.closePath(); ctx.stroke();
    }
  }

  function drawMarker(x, y, hot, now){
    const ctx = Field.ctx, C = Field.COL, P = Field.PIX;
    const base = Math.max(4, Field.W*0.007);
    const r = hot ? base*1.65 : base;
    if(hot){
      const inten = state === "landed" ? (0.5 + 0.5*Math.sin(now/150)) : 1;
      const R = r + P*2 + Field.W*0.022;
      ctx.fillStyle = C.dot;
      const x0=Math.floor((x-R)/P), x1=Math.ceil((x+R)/P), y0=Math.floor((y-R)/P), y1=Math.ceil((y+R)/P);
      for(let cy=y0;cy<=y1;cy++) for(let cx=x0;cx<=x1;cx++){
        const px=cx*P+P/2, py=cy*P+P/2, d=Math.hypot(px-x,py-y);
        if(d<=r || d>R) continue;
        if(Field.bayer(cx,cy, inten*(1-d/R))) ctx.fillRect(cx*P,cy*P,P,P);
      }
    }
    ctx.strokeStyle = C.dot; ctx.lineWidth = hot ? Math.max(2*P,2) : Math.max(1,P);
    ctx.beginPath();
    ctx.moveTo(x, y-r); ctx.lineTo(x+r, y); ctx.lineTo(x, y+r); ctx.lineTo(x-r, y);
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle = C.dot;
    ctx.fillRect(Math.round(x-P/2), Math.round(y-P/2), Math.max(1,P), Math.max(1,P));
  }

  function drawMapLabel(x, y){
    const ctx = Field.ctx, C = Field.COL, m = curMap(), p = m.pois[result];
    const s = Math.max(11, Field.W*0.017);
    ctx.font = "700 " + s + "px " + Field.MONO;
    ctx.textAlign = "center"; ctx.textBaseline = "bottom";
    const above = y - Math.max(4, Field.W*0.007)*1.9 - 4;
    ctx.fillStyle = C.dot;
    ctx.fillText(p.n, x, above < s+4 ? y + Math.max(4,Field.W*0.007)*2 + s : above);
  }

  function draw(now){
    Field.clear();
    const m = curMap();
    drawOutline(Field.ctx, m, tx, ty, Field.COL.dim, Math.max(1, Field.PIX));
    for(let i=0;i<m.pois.length;i++){
      const p = m.pois[i];
      const hot = (state==="spinning" && i===current) || (state==="landed" && i===result);
      if(!hot) drawMarker(tx(p.x), ty(p.y), false, now);
    }
    // draw the hot marker last so its glow sits on top
    if(state==="spinning") drawMarker(tx(m.pois[current].x), ty(m.pois[current].y), true, now);
    else if(state==="landed"){
      drawMarker(tx(m.pois[result].x), ty(m.pois[result].y), true, now);
      drawMapLabel(tx(m.pois[result].x), ty(m.pois[result].y));
    }
  }

  /* ---------- spin ---------- */
  function spin(){
    if(state !== "ready" && state !== "landed") return;
    const N = curMap().pois.length; if(N < 2) return;
    spinTarget = Math.floor(Math.random()*N);
    const loops = 3 + Math.floor(Math.random()*3);
    spinSteps = loops*N + spinTarget;
    spinDur = 3800 + Math.random()*1400;
    spinStart = performance.now();
    state = "spinning"; result = -1;
    setReadout(); setButtons();
  }
  function updateSpin(now){
    const t = Math.min(1, (now - spinStart) / spinDur);
    const e = 1 - Math.pow(1 - t, 4);          // ease-out quart: fast, then lands
    const N = curMap().pois.length;
    current = Math.floor(e * spinSteps) % N;
    if(t >= 1){ state = "landed"; result = current; setReadout(); setButtons(); }
  }

  /* ---------- readout + controls ---------- */
  function setReadout(){
    readoutEl.querySelector(".mapname").textContent = mapKeys[Field.vis.map].toUpperCase();
    const el = readoutEl.querySelector(".poi");
    if(state === "spinning"){ el.textContent = "SELECTING…"; el.classList.add("spin"); }
    else if(state === "landed"){ el.textContent = curMap().pois[result].n; el.classList.remove("spin"); }
    else { el.textContent = "—"; el.classList.remove("spin"); }
  }
  function mkbtn(label, cls, fn){ const b=document.createElement("button"); b.className="btn "+cls; b.textContent=label; b.onclick=fn; return b; }
  function setButtons(){
    controlsEl.innerHTML = "";
    if(state === "select" || state === "spinning") return;
    controlsEl.append(
      mkbtn(state==="landed" ? "SELECT AGAIN" : "SELECT POI", "on", spin),
      mkbtn("CHANGE MAP", "ghost", openPicker)
    );
  }

  /* ---------- map picker ---------- */
  function drawIcon(cv, key){
    const m = MAPS[key], b = bbox(m), ctx = cv.getContext("2d");
    ctx.setTransform(1,0,0,1,0,0);
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = Field.COL.bg; ctx.fillRect(0,0,cv.width,cv.height);
    const pad = 8, s = Math.min((cv.width-2*pad)/b.w, (cv.height-2*pad)/b.h);
    const ox = pad + ((cv.width-2*pad) - b.w*s)/2 - b.mnx*s;
    const oy = pad + ((cv.height-2*pad) - b.h*s)/2 - b.mny*s;
    const ix = x=>ox+x*s, iy = y=>oy+y*s;
    drawOutline(ctx, m, ix, iy, Field.COL.dim, 1);
    ctx.fillStyle = Field.COL.dot;
    for(const p of m.pois) ctx.fillRect(Math.round(ix(p.x))-1, Math.round(iy(p.y))-1, 2, 2);
  }
  function buildPicker(){
    pickerEl.innerHTML = '<div class="pk-panel"><div class="strip"><span class="sq"></span>SELECT MAP</div><div class="pk-grid"></div></div>';
    const grid = pickerEl.querySelector(".pk-grid");
    mapKeys.forEach((k,i)=>{
      const tile = document.createElement("button"); tile.className = "pk-tile";
      const cv = document.createElement("canvas"); cv.width = 200; cv.height = 130;
      const nm = document.createElement("div"); nm.className = "pk-nm"; nm.textContent = k;
      const ct = document.createElement("div"); ct.className = "pk-ct"; ct.textContent = MAPS[k].pois.length + " POIS";
      tile.append(cv, nm, ct);
      tile.onclick = () => choose(i);
      grid.appendChild(tile);
    });
    refreshIcons();
  }
  function refreshIcons(){
    pickerEl.querySelectorAll(".pk-tile").forEach((tile,i)=>{
      drawIcon(tile.querySelector("canvas"), mapKeys[i]);
      tile.classList.toggle("sel", i === Field.vis.map);
    });
  }
  function openPicker(){ state = "select"; pickerEl.classList.add("show"); refreshIcons(); setReadout(); setButtons(); }
  function choose(i){ Field.vis.map = i; Field.vis.picked = true; Field.saveVis(); pickerEl.classList.remove("show"); loadMap(); }
  function loadMap(){ state = "ready"; result = -1; current = 0; fit(); setReadout(); setButtons(); }

  /* ---------- boot ---------- */
  Field.create({
    prefix: "poi",
    visDefaults: { map: 0, picked: false },
    hint: "H HIDE · SPACE SELECT · F FULL",
    onResize: () => { fit(); },
    onControl: (key) => {
      if(key === "reset"){ buildPicker(); openPicker(); return; }
      if(key === "palette") refreshIcons();
      fit();
    },
    keys: { " ": () => spin() },
  });

  if(params.get("map")){ const mi = parseInt(params.get("map")); if(mi>=0 && mi<mapKeys.length) Field.vis.map = mi; }

  buildPicker();
  fit();
  if(Field.vis.picked) loadMap();
  else openPicker();

  function frame(now){
    if(state === "spinning") updateSpin(now);
    draw(now);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  </script>
</body>
</html>
