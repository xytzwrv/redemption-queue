<title>RANDOM POI — DRACULA</title>
<link rel="stylesheet" href="../shared/dracula.css">
<style>
  #readout{
    position:fixed; top:18px; left:50%; transform:translateX(-50%); z-index:20;
    min-width:260px; max-width:min(90vw,640px);
  }
  #readout .strip .mapname{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #readout .body{ padding:16px 24px 18px; text-align:center; }
  #readout .poi{
    font-family:var(--sans); font-weight:800; font-size:26px; letter-spacing:.2px;
    line-height:1.15; word-break:break-word; color:var(--fg);
  }
  #readout .poi.spin{ color:var(--dot); }

  #controls{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px; z-index:20;
  }

  #picker{
    position:fixed; inset:0; z-index:35; display:none;
    align-items:center; justify-content:center; background:rgba(15,16,22,.55); backdrop-filter:blur(4px);
  }
  #picker.show{ display:flex; }
  #picker .pk-panel{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    width:min(92vw,600px); box-shadow:0 24px 60px -18px rgba(0,0,0,.7); backdrop-filter:blur(14px); overflow:hidden;
  }
  #picker .pk-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px; }
  .pk-tile{
    background:transparent; border:1px solid var(--line); border-radius:12px; color:var(--fg); cursor:pointer;
    padding:10px; display:flex; flex-direction:column; align-items:center; gap:8px;
    font-family:var(--sans); transition:transform .1s, border-color .15s, box-shadow .15s;
  }
  .pk-tile:hover{ border-color:var(--dot); transform:translateY(-2px); }
  .pk-tile.sel{ border-color:var(--dot); box-shadow:0 0 0 2px var(--dot); }
  .pk-tile canvas{ width:100%; height:auto; border-radius:8px; background:rgba(0,0,0,.15); }
  .pk-nm{ font-size:12px; font-weight:700; letter-spacing:.2px; text-align:center; }
  .pk-ct{ font-family:var(--mono); font-size:10px; color:var(--dot); }
</style>
</head>

  const mapKeys = Object.keys(MAPS);
  const params = new URLSearchParams(location.search);

  const readoutEl = document.getElementById("readout");
  const controlsEl = document.getElementById("controls");
  const pickerEl = document.getElementById("picker");

  let state = "select";                 // select | ready | spinning | landed
  let current = 0, result = -1;
  let spinStart = 0, spinDur = 0, spinSteps = 0, spinTarget = 0;
  let T = { s:1, ox:0, oy:0 };

  const curMap = () => MAPS[mapKeys[Field.vis.map]];   // array of POIs
  const tx = (x) => T.ox + x * T.s;
  const ty = (y) => T.oy + y * T.s;

  function bbox(pois){
    let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;
    const acc=(x,y)=>{ if(x<mnx)mnx=x; if(y<mny)mny=y; if(x>mxx)mxx=x; if(y>mxy)mxy=y; };
    for(const poi of pois) for(const poly of poi.p) for(const [x,y] of poly) acc(x,y);
    return { mnx,mny,mxx,mxy, w:Math.max(1,mxx-mnx), h:Math.max(1,mxy-mny) };
  }
  function fit(){
    const b = bbox(curMap());
    const mTop = Field.H*0.15, mBot = Field.H*0.17, mX = Field.W*0.06;
    const availW = Field.W - 2*mX, availH = Field.H - mTop - mBot;
    const s = Math.min(availW/b.w, availH/b.h);
    T = { s, ox: mX + (availW - b.w*s)/2 - b.mnx*s, oy: mTop + (availH - b.h*s)/2 - b.mny*s };
  }

  /* ---------- rendering: bordered wireframe regions ---------- */
  function traceRegion(ctx, poi, mapx, mapy){
    for(const poly of poi.p){
      ctx.beginPath();
      ctx.moveTo(mapx(poly[0][0]), mapy(poly[0][1]));
      for(let i=1;i<poly.length;i++) ctx.lineTo(mapx(poly[i][0]), mapy(poly[i][1]));
      ctx.closePath();
    }
  }
  function strokeRegion(ctx, poi, mapx, mapy, col, lw){
    ctx.strokeStyle = col; ctx.lineWidth = lw;
    for(const poly of poi.p){
      ctx.beginPath();
      ctx.moveTo(mapx(poly[0][0]), mapy(poly[0][1]));
      for(let i=1;i<poly.length;i++) ctx.lineTo(mapx(poly[i][0]), mapy(poly[i][1]));
      ctx.closePath(); ctx.stroke();
    }
  }
  function glowRegion(poi, now){
    const ctx = Field.ctx, C = Field.COL;
    // smooth translucent fill (dracula.js renders dithRect as alpha) — keep it soft
    const inten = state === "landed" ? (0.26 + 0.16*Math.sin(now/150)) : 0.4;
    const path = new Path2D();
    let mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9;
    for(const poly of poi.p){
      path.moveTo(tx(poly[0][0]), ty(poly[0][1]));
      for(let i=1;i<poly.length;i++) path.lineTo(tx(poly[i][0]), ty(poly[i][1]));
      path.closePath();
      for(const [x,y] of poly){ const sx=tx(x), sy=ty(y); if(sx<mnx)mnx=sx;if(sy<mny)mny=sy;if(sx>mxx)mxx=sx;if(sy>mxy)mxy=sy; }
    }
    ctx.save(); ctx.clip(path);
    Field.dithRect(mnx, mny, mxx-mnx, mxy-mny, inten, C.dot);   // whole region dithers
    ctx.restore();
  }
  function drawMapLabel(poi){
    const ctx = Field.ctx, C = Field.COL;
    const s = Math.max(13, Field.W*0.019);
    ctx.font = "800 " + s + "px " + Field.FONT;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.lineJoin = "round"; ctx.lineWidth = 4;
    ctx.strokeStyle = C.bg; ctx.strokeText(poi.n, tx(poi.cx), ty(poi.cy));   // halo for legibility
    ctx.fillStyle = C.fg; ctx.fillText(poi.n, tx(poi.cx), ty(poi.cy));
  }

  function draw(now){
    Field.clear();
    const m = curMap(), ctx = Field.ctx, C = Field.COL, P = Field.PIX;
    const hot = state === "spinning" ? current : (state === "landed" ? result : -1);
    // all regions: uniform wireframe borders
    for(let i=0;i<m.length;i++){ if(i===hot) continue; strokeRegion(ctx, m[i], tx, ty, C.dot, Math.max(1,P)); }
    // active region: whole-area dithered glow + emphasized border on top
    if(hot >= 0){
      glowRegion(m[hot], now);
      strokeRegion(ctx, m[hot], tx, ty, C.dot, Math.max(2*P, 2));
      if(state === "landed") drawMapLabel(m[hot]);
    }
  }

  /* ---------- spin ---------- */
  function spin(){
    if(state !== "ready" && state !== "landed") return;
    const N = curMap().length; if(N < 2) return;
    spinTarget = Math.floor(Math.random()*N);
    const loops = 3 + Math.floor(Math.random()*3);
    spinSteps = loops*N + spinTarget;
    spinDur = 3800 + Math.random()*1400;
    spinStart = performance.now();
    state = "spinning"; result = -1;
    setReadout(); setButtons();
  }
  function updateSpin(now){
    const t = Math.min(1, (now - spinStart) / spinDur);
    const e = 1 - Math.pow(1 - t, 4);
    const N = curMap().length;
    current = Math.floor(e * spinSteps) % N;
    if(t >= 1){ state = "landed"; result = current; setReadout(); setButtons(); }
  }

  /* ---------- readout + controls ---------- */
  function setReadout(){
    readoutEl.querySelector(".mapname").textContent = mapKeys[Field.vis.map].toUpperCase();
    const el = readoutEl.querySelector(".poi");
    if(state === "spinning"){ el.textContent = "SELECTING…"; el.classList.add("spin"); }
    else if(state === "landed"){ el.textContent = curMap()[result].n; el.classList.remove("spin"); }
    else { el.textContent = "—"; el.classList.remove("spin"); }
  }
  function mkbtn(label, cls, fn){ const b=document.createElement("button"); b.className="btn "+cls; b.textContent=label; b.onclick=fn; return b; }
  function setButtons(){
    controlsEl.innerHTML = "";
    if(state === "select" || state === "spinning") return;
    controlsEl.append(
      mkbtn(state==="landed" ? "SELECT AGAIN" : "SELECT POI", "on", spin),
      mkbtn("CHANGE MAP", "ghost", openPicker)
    );
  }

  /* ---------- map picker ---------- */
  function drawIcon(cv, key){
    const pois = MAPS[key], b = bbox(pois), ctx = cv.getContext("2d");
    ctx.setTransform(1,0,0,1,0,0); ctx.imageSmoothingEnabled = true;
    ctx.fillStyle = Field.COL.bg; ctx.fillRect(0,0,cv.width,cv.height);
    const pad = 8, s = Math.min((cv.width-2*pad)/b.w, (cv.height-2*pad)/b.h);
    const ox = pad + ((cv.width-2*pad) - b.w*s)/2 - b.mnx*s;
    const oy = pad + ((cv.height-2*pad) - b.h*s)/2 - b.mny*s;
    const ix = x=>ox+x*s, iy = y=>oy+y*s;
    for(const poi of pois) strokeRegion(ctx, poi, ix, iy, Field.COL.dim, 1);
  }
  function buildPicker(){
    pickerEl.innerHTML = '<div class="pk-panel"><div class="strip"><span class="sq"></span>SELECT MAP</div><div class="pk-grid"></div></div>';
    const grid = pickerEl.querySelector(".pk-grid");
    mapKeys.forEach((k,i)=>{
      const tile = document.createElement("button"); tile.className = "pk-tile";
      const cv = document.createElement("canvas"); cv.width = 200; cv.height = 130;
      const nm = document.createElement("div"); nm.className = "pk-nm"; nm.textContent = k;
      const ct = document.createElement("div"); ct.className = "pk-ct"; ct.textContent = MAPS[k].length + " POIS";
      tile.append(cv, nm, ct);
      tile.onclick = () => choose(i);
      grid.appendChild(tile);
    });
    refreshIcons();
  }
  function refreshIcons(){
    pickerEl.querySelectorAll(".pk-tile").forEach((tile,i)=>{
      drawIcon(tile.querySelector("canvas"), mapKeys[i]);
      tile.classList.toggle("sel", i === Field.vis.map);
    });
  }
  function openPicker(){ state = "select"; pickerEl.classList.add("show"); refreshIcons(); setReadout(); setButtons(); }
  function choose(i){ userPicked = true; Field.vis.map = i; Field.vis.picked = true; Field.saveVis(); pickerEl.classList.remove("show"); loadMap(); }
  function loadMap(){ state = "ready"; result = -1; current = 0; fit(); setReadout(); setButtons(); }

  /* ================================================================
     APEX MAP ROTATION — auto-select the live BR map. Invisible to
     viewers; the API key is obfuscated (XOR+base64, split) and never
     logged or shown. This is deterrence, not real secrecy: a client
     key is technically extractable — override with ?apexkey= or
     localStorage['poi:apexkey'], or proxy it server-side for real
     privacy. Failures are silent.
     ================================================================ */
  const APEX = { host: "https://api.mozambiquehe.re", mode: params.get("mode") || "battle_royale", refreshMin: 12 };
  const APEX_DEBUG = params.get("apexdebug") === "1";
  function apexKey(){
    const override = params.get("apexkey") || localStorage.getItem("poi:apexkey");
    if(override) return override.trim();
    try{
      const raw = atob("CARbFhUDDFVeAU" + "xJCllJRApAVhVeF" + "FUAC0xLUFhQVAE=");
      const p = "1bit-field-poi-rotator"; let s = "";
      for(let i=0;i<raw.length;i++) s += String.fromCharCode(raw.charCodeAt(i) ^ p.charCodeAt(i % p.length));
      return s;
    }catch(e){ return ""; }
  }
  const _norm = s => (s||"").toLowerCase().replace(/[^a-z0-9]/g,"");
  const _normKeys = {}; mapKeys.forEach((k,i)=> _normKeys[_norm(k)] = i);
  let userPicked = false;
  async function fetchRotation(){
    try{
      const key = apexKey(); if(!key) return;
      const r = await fetch(APEX.host + "/maprotation?version=2&auth=" + encodeURIComponent(key), { cache: "no-store" });
      if(!r.ok){ if(APEX_DEBUG) console.warn("[rot] http", r.status); return; }
      const j = await r.json();
      if(j.Error){ if(APEX_DEBUG) console.warn("[rot]", j.Error); return; }
      const mode = j[APEX.mode];
      const name = mode && mode.current && mode.current.map;
      if(APEX_DEBUG) console.log("[rot] current", APEX.mode, "=", name);
      if(!name) return;
      const idx = _normKeys[_norm(name)];
      if(idx === undefined) return;         // a map we have no POI data for
      if(userPicked) return;                // respect a manual choice this session
      if(idx === Field.vis.map && Field.vis.picked && state !== "select") return;  // already there
      Field.vis.map = idx; Field.vis.picked = true; Field.saveVis();
      pickerEl.classList.remove("show");
      if(state !== "spinning") loadMap();
    }catch(e){ if(APEX_DEBUG) console.warn("[rot] fail", e); }
  }

  /* ---------- boot ---------- */
  Field.create({
    prefix: "poidr",
    visDefaults: { map: 0, picked: false },
    keepOnReset: ["map", "picked"],
    hint: "H hide · Space select · F fullscreen",
    onResize: () => { fit(); },
    onControl: (key) => {
      if(key === "reset"){ buildPicker(); openPicker(); return; }
      if(key === "palette") refreshIcons();
      fit();
    },
    keys: { " ": () => spin() },
  });

  if(params.get("map")){ const mi = parseInt(params.get("map")); if(mi>=0 && mi<mapKeys.length) Field.vis.map = mi; }

  buildPicker();
  fit();
  if(Field.vis.picked) loadMap();
  else openPicker();

  fetchRotation();
  setInterval(fetchRotation, APEX.refreshMin * 60000);

  function frame(now){
    if(state === "spinning") updateSpin(now);
    draw(now);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  </script>
</body>
</html>
