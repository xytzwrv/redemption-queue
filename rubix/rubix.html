<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Three.js Rubix Cube Stream Element</title>
<meta name="description" content="Transparent OBS-ready Three.js Rubix cube that scrambles, slowly solves over a minute, and loops." />
<style>
  * { box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    font-family: "Segoe UI", Inter, system-ui, sans-serif;
  }

  main, canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  canvas { cursor: pointer; }

  #status {
    position: fixed;
    right: 16px;
    bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 122px;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 999px;
    background: rgba(10, 12, 18, .52);
    color: #f8f8f2;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .28px;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    text-shadow: 0 1px 2px rgba(0,0,0,.8);
    pointer-events: none;
  }

  #status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #50fa7b;
    box-shadow: 0 0 12px currentColor;
  }

  #status.scrambling .dot { background: #ffb86c; }

  #controls {
    position: fixed;
    left: 16px;
    bottom: 16px;
    width: min(390px, calc(100vw - 32px));
    max-height: min(82vh, 680px);
    overflow: auto;
    padding: 12px;
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 16px;
    background: rgba(10, 12, 18, .72);
    color: #f8f8f2;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .22px;
    backdrop-filter: blur(10px);
    text-shadow: 0 1px 2px rgba(0,0,0,.8);
    pointer-events: auto;
  }

  #controls[hidden] { display: none; }

  #controls .panel-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  #controls .hint {
    color: rgba(248, 248, 242, .72);
    font-weight: 600;
    text-transform: none;
  }

  #controls details {
    border-top: 1px solid rgba(255,255,255,.12);
    padding-top: 8px;
    margin-top: 8px;
  }

  #controls summary {
    cursor: pointer;
    color: #8be9fd;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  #controls .field {
    display: grid;
    grid-template-columns: 120px 1fr;
    align-items: center;
    gap: 8px;
    margin: 8px 0;
  }

  #controls label { text-transform: uppercase; }

  #controls input, #controls select {
    width: 100%;
    min-width: 0;
    border: 1px solid rgba(255,255,255,.16);
    border-radius: 8px;
    background: rgba(0,0,0,.34);
    color: #f8f8f2;
    padding: 6px 8px;
    font: inherit;
    text-shadow: none;
  }

  #controls input[type="range"] {
    padding: 0;
    accent-color: #8be9fd;
  }

  #sensitivityValue {
    color: #8be9fd;
    font-variant-numeric: tabular-nums;
  }

  #controls .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }

  #controls button {
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 10px;
    background: rgba(139, 233, 253, .18);
    color: #f8f8f2;
    padding: 8px 10px;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    text-transform: uppercase;
  }

  #copyStatus {
    min-height: 16px;
    margin-top: 8px;
    color: #50fa7b;
    font-size: 11px;
    text-transform: none;
  }

  @media (max-width: 420px) {
    #status { right: 10px; bottom: 10px; font-size: 10px; min-width: 104px; }
    body.has-controls #status { bottom: 88px; }
    #controls { left: 10px; bottom: 10px; width: min(280px, calc(100vw - 20px)); max-height: 58vh; }
    #controls .field { grid-template-columns: 92px 1fr; }
  }
</style>
</head>
<body>
<main aria-label="Animated Three.js self-solving Rubix cube stream element">
  <canvas id="rubixCanvas" aria-hidden="true"></canvas>
</main>
<div id="status" aria-live="polite"><span class="dot"></span><span id="statusText">Loading</span></div>
<div id="controls" hidden>
  <div class="panel-title">
    <span>Rubix Settings</span>
    <span class="hint">click cube to hide/show</span>
  </div>

  <details open>
    <summary>Audio</summary>
    <div class="field"><label for="setting-mic">Mode</label><select id="setting-mic" data-param="mic"><option value="">Normal</option><option value="obs">OBS WebSocket</option><option value="1">Browser mic</option></select></div>
    <div class="field"><label for="setting-obsInput">OBS input</label><input id="setting-obsInput" data-param="obsInput" placeholder="Mic/Aux" /></div>
    <div class="field"><label for="setting-obsHost">OBS host</label><input id="setting-obsHost" data-param="obsHost" placeholder="127.0.0.1" /></div>
    <div class="field"><label for="setting-obsPort">OBS port</label><input id="setting-obsPort" data-param="obsPort" inputmode="numeric" placeholder="4455" /></div>
    <div class="field"><label for="setting-obsPassword">Password</label><input id="setting-obsPassword" data-param="obsPassword" type="password" placeholder="optional" /></div>
    <div class="field"><label for="sensitivity">Sensitivity</label><div><input id="sensitivity" data-param="sensitivity" type="range" min="0.1" max="4" step="0.05" value="1" /><span id="sensitivityValue">1.00×</span></div></div>
    <div class="field"><label for="setting-dbMin">0% dB</label><input id="setting-dbMin" data-param="dbMin" type="number" step="1" placeholder="-60" /></div>
    <div class="field"><label for="setting-dbMax">100% dB</label><input id="setting-dbMax" data-param="dbMax" type="number" step="1" placeholder="-12" /></div>
    <div class="field"><label for="setting-minSpeed">0% speed</label><input id="setting-minSpeed" data-param="minSpeed" type="number" step="0.1" placeholder="0.1" /></div>
    <div class="field"><label for="setting-maxSpeed">100% speed</label><input id="setting-maxSpeed" data-param="maxSpeed" type="number" step="0.5" placeholder="10" /></div>
  </details>

  <details>
    <summary>Cube + timing</summary>
    <div class="field"><label for="setting-scale">Scale</label><input id="setting-scale" data-param="scale" type="number" step="0.05" placeholder="0.82" /></div>
    <div class="field"><label for="setting-size">Cubie size</label><input id="setting-size" data-param="size" type="number" step="0.05" placeholder="1" /></div>
    <div class="field"><label for="setting-gap">Gap</label><input id="setting-gap" data-param="gap" type="number" step="0.01" placeholder="0.08" /></div>
    <div class="field"><label for="setting-solveMs">Solve ms</label><input id="setting-solveMs" data-param="solveMs" type="number" step="1000" placeholder="60000" /></div>
    <div class="field"><label for="setting-moves">Moves</label><input id="setting-moves" data-param="moves" type="number" step="1" placeholder="24" /></div>
    <div class="field"><label for="setting-scrambleMs">Scramble ms</label><input id="setting-scrambleMs" data-param="scrambleMs" type="number" step="10" placeholder="220" /></div>
  </details>

  <details>
    <summary>Images</summary>
    <div class="field"><label for="setting-img">All faces</label><input id="setting-img" data-param="img" placeholder="https://.../image.png" /></div>
    <div class="field"><label for="setting-frontImg">Front</label><input id="setting-frontImg" data-param="frontImg" placeholder="https://..." /></div>
    <div class="field"><label for="setting-backImg">Back</label><input id="setting-backImg" data-param="backImg" placeholder="https://..." /></div>
    <div class="field"><label for="setting-leftImg">Left</label><input id="setting-leftImg" data-param="leftImg" placeholder="https://..." /></div>
    <div class="field"><label for="setting-rightImg">Right</label><input id="setting-rightImg" data-param="rightImg" placeholder="https://..." /></div>
    <div class="field"><label for="setting-upImg">Top</label><input id="setting-upImg" data-param="upImg" placeholder="https://..." /></div>
    <div class="field"><label for="setting-downImg">Bottom</label><input id="setting-downImg" data-param="downImg" placeholder="https://..." /></div>
  </details>

  <div class="actions">
    <button id="applySettings" type="button">Apply URL</button>
    <button id="copySettings" type="button">Copy URL</button>
  </div>
  <div id="copyStatus" aria-live="polite"></div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js";

const params = new URLSearchParams(location.search);
const SOLVE_MS = Number(params.get("solveMs")) || 60000;
const SCRAMBLE_MS = Number(params.get("scrambleMs")) || 220;
const SCRAMBLE_MOVES = Number(params.get("moves")) || 24;
const micParam = params.get("mic") || params.get("microphone") || "";
const MIC_MODE = /^(1|true|yes|on)$/i.test(micParam);
const OBSWS_MODE = /^(obs|obsws|websocket)$/i.test(micParam) || /^(1|true|yes|on)$/i.test(params.get("obsws") || "");
const MIC_SILENT_MOVE_MS = Number(params.get("micSilentMs")) || 9500;
const MIC_LOUD_MOVE_MS = Number(params.get("micLoudMs")) || 180;
const OBSWS_URL = params.get("obsWsUrl") || `ws://${params.get("obsHost") || "127.0.0.1"}:${params.get("obsPort") || "4455"}`;
const OBSWS_INPUT = params.get("obsInput") || params.get("input") || "";
const OBSWS_PASSWORD = params.get("obsPassword") || params.get("password") || "";
const SHOW_CONTROLS = /^(1|true|yes|on)$/i.test(params.get("controls") || params.get("slider") || "");
const initialSensitivity = Number(params.get("sensitivity"));
let audioSensitivity = Number.isFinite(initialSensitivity) && initialSensitivity > 0 ? initialSensitivity : 1;
const AUDIO_DB_MIN = Number(params.get("dbMin") ?? params.get("zeroDb") ?? -60);
const AUDIO_DB_MAX = Number(params.get("dbMax") ?? params.get("hundredDb") ?? -12);
const AUDIO_MIN_SPEED = Number(params.get("minSpeed")) || 0.1;
const AUDIO_MAX_SPEED = Number(params.get("maxSpeed")) || 10;
const scaleParam = Number(params.get("scale"));
const CUBE_SCALE = Number.isFinite(scaleParam) && scaleParam > 0 ? scaleParam : 0.82;
const CUBIE_SIZE = Number(params.get("size")) || 1;
const GAP = Number(params.get("gap")) || 0.08;
const SPACING = CUBIE_SIZE + GAP;
const HALF = CUBIE_SIZE / 2;
const normalSolveMoveMs = SOLVE_MS / SCRAMBLE_MOVES;

const canvas = document.getElementById("rubixCanvas");
const status = document.getElementById("status");
const statusText = document.getElementById("statusText");
const controls = document.getElementById("controls");
const sensitivity = document.getElementById("sensitivity");
const sensitivityValue = document.getElementById("sensitivityValue");
const applySettings = document.getElementById("applySettings");
const copySettings = document.getElementById("copySettings");
const copyStatus = document.getElementById("copyStatus");
const settingInputs = [...controls.querySelectorAll("[data-param]")];

function setSensitivity(value) {
  audioSensitivity = THREE.MathUtils.clamp(Number(value) || 1, 0.1, 4);
  sensitivity.value = String(audioSensitivity);
  sensitivityValue.textContent = `${audioSensitivity.toFixed(2)}×`;
}

function seedSettingsPanel() {
  for (const input of settingInputs) {
    const key = input.dataset.param;
    const value = params.get(key);
    if (value !== null) input.value = value;
  }
  if (!params.has("sensitivity")) sensitivity.value = String(audioSensitivity);
  setSensitivity(sensitivity.value);
}

if (SHOW_CONTROLS) {
  controls.hidden = false;
  document.body.classList.add("has-controls");
}
sensitivity.addEventListener("input", () => setSensitivity(sensitivity.value));
seedSettingsPanel();

function setControlsVisible(visible) {
  controls.hidden = !visible;
  document.body.classList.toggle("has-controls", visible);
}

canvas.addEventListener("click", () => {
  if (SHOW_CONTROLS) setControlsVisible(controls.hidden);
});

controls.addEventListener("click", (event) => event.stopPropagation());

function buildSettingsUrl() {
  const url = new URL(location.href);
  const next = url.searchParams;
  if (SHOW_CONTROLS) next.set("controls", "1");
  for (const input of settingInputs) {
    const key = input.dataset.param;
    const value = String(input.value || "").trim();
    if (value) next.set(key, value);
    else next.delete(key);
  }
  return url;
}

applySettings.addEventListener("click", () => {
  location.href = buildSettingsUrl().toString();
});

copySettings.addEventListener("click", async () => {
  const url = buildSettingsUrl().toString();
  try {
    await navigator.clipboard.writeText(url);
    copyStatus.textContent = "Copied URL.";
  } catch {
    copyStatus.textContent = url;
  }
});

const mic = {
  state: MIC_MODE ? "starting" : "off",
  analyser: null,
  data: null,
  level: 0,
  db: -Infinity,
};

const obsws = {
  state: OBSWS_MODE ? "connecting" : "off",
  socket: null,
  level: 0,
  db: -Infinity,
  retryAt: 0,
};

let audioPercent = 0;
let audioDb = -Infinity;

function dbToPercent(db) {
  const low = Math.min(AUDIO_DB_MIN, AUDIO_DB_MAX);
  const high = Math.max(AUDIO_DB_MIN, AUDIO_DB_MAX);
  return THREE.MathUtils.clamp((db - low) / Math.max(0.001, high - low), 0, 1);
}

function linearToDb(value) {
  return 20 * Math.log10(Math.max(0.000001, value));
}

function formatDb(db) {
  return Number.isFinite(db) ? `${Math.round(db)}dB` : "-∞dB";
}

async function initMic() {
  if (!MIC_MODE) return;
  if (!navigator.mediaDevices?.getUserMedia) {
    mic.state = "unavailable";
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
      },
      video: false,
    });
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const context = new AudioContext();
    if (context.state === "suspended") await context.resume();
    const source = context.createMediaStreamSource(stream);
    const analyser = context.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.72;
    source.connect(analyser);
    mic.analyser = analyser;
    mic.data = new Uint8Array(analyser.fftSize);
    mic.state = "listening";
  } catch (error) {
    mic.state = "blocked";
    console.warn("Rubix microphone mode could not start:", error);
  }
}

function readMicLevel() {
  if (!mic.analyser || !mic.data) return mic.level;
  mic.analyser.getByteTimeDomainData(mic.data);
  let sum = 0;
  for (const value of mic.data) {
    const centered = (value - 128) / 128;
    sum += centered * centered;
  }
  const rms = Math.sqrt(sum / mic.data.length);
  mic.db = linearToDb(rms);
  const normalized = dbToPercent(mic.db);
  mic.level = mic.level * 0.82 + normalized * 0.18;
  return mic.level;
}

function base64FromBuffer(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

async function obsAuthResponse(password, salt, challenge) {
  const encoder = new TextEncoder();
  const secret = await crypto.subtle.digest("SHA-256", encoder.encode(password + salt));
  const auth = await crypto.subtle.digest("SHA-256", encoder.encode(base64FromBuffer(secret) + challenge));
  return base64FromBuffer(auth);
}

function extractObsLevel(eventData) {
  const target = OBSWS_INPUT.trim().toLowerCase();
  let best = 0;
  for (const input of eventData?.inputs || []) {
    if (target && String(input.inputName || "").toLowerCase() !== target) continue;
    const levels = Array.isArray(input.inputLevelsMul) ? input.inputLevelsMul.flat(Infinity) : [];
    for (const value of levels) {
      const number = Number(value);
      if (Number.isFinite(number)) best = Math.max(best, number);
    }
  }
  obsws.db = linearToDb(best);
  return dbToPercent(obsws.db);
}

function connectObsWebSocket() {
  if (!OBSWS_MODE || obsws.socket || performance.now() < obsws.retryAt) return;
  obsws.state = "connecting";
  const socket = new WebSocket(OBSWS_URL);
  obsws.socket = socket;

  socket.addEventListener("open", () => { obsws.state = "hello"; });
  socket.addEventListener("close", () => {
    obsws.socket = null;
    obsws.state = "closed";
    obsws.retryAt = performance.now() + 5000;
  });
  socket.addEventListener("error", () => { obsws.state = "error"; });
  socket.addEventListener("message", async (message) => {
    let packet;
    try { packet = JSON.parse(message.data); } catch { return; }

    if (packet.op === 0) {
      const identify = { rpcVersion: 1, eventSubscriptions: 1 << 16 };
      const auth = packet.d?.authentication;
      if (auth?.challenge && auth?.salt) {
        if (!OBSWS_PASSWORD) {
          obsws.state = "needs password";
          socket.close();
          return;
        }
        identify.authentication = await obsAuthResponse(OBSWS_PASSWORD, auth.salt, auth.challenge);
      }
      socket.send(JSON.stringify({ op: 1, d: identify }));
    } else if (packet.op === 2) {
      obsws.state = "listening";
    } else if (packet.op === 5 && packet.d?.eventType === "InputVolumeMeters") {
      const level = extractObsLevel(packet.d.eventData);
      obsws.level = obsws.level * 0.72 + level * 0.28;
    }
  });
}

function readAudioLevel() {
  let level = 0;
  if (OBSWS_MODE) {
    connectObsWebSocket();
    level = obsws.state === "listening" ? obsws.level : 0;
    audioDb = obsws.db;
  } else {
    level = mic.state === "listening" ? readMicLevel() : 0;
    audioDb = mic.db;
  }
  audioPercent = THREE.MathUtils.clamp(level * audioSensitivity, 0, 1);
  return audioPercent;
}

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, premultipliedAlpha: false });
renderer.setClearColor(0x000000, 0);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
camera.position.set(5.0, 3.8, 10.5);
camera.lookAt(0, 0, 0);

scene.add(new THREE.HemisphereLight(0xffffff, 0x1f2430, 2.4));
const key = new THREE.DirectionalLight(0xffffff, 2.1);
key.position.set(4, 5, 7);
key.castShadow = true;
scene.add(key);
const rim = new THREE.DirectionalLight(0x8be9fd, 0.85);
rim.position.set(-5, 2, -4);
scene.add(rim);

const cubeRoot = new THREE.Group();
cubeRoot.scale.setScalar(CUBE_SCALE);
scene.add(cubeRoot);

const palette = {
  right: 0xe64b3d,
  left: 0xff9f43,
  up: 0xf8f8f2,
  down: 0xf4d03f,
  front: 0x2ecc71,
  back: 0x3b82f6,
  plastic: 0x11141c,
};

const imageUrlAll = params.get("img") || params.get("image") || params.get("faceImg") || "";
const faceImageUrls = {
  right: params.get("rightImg") || params.get("xPosImg") || imageUrlAll,
  left: params.get("leftImg") || params.get("xNegImg") || imageUrlAll,
  up: params.get("upImg") || params.get("topImg") || params.get("yPosImg") || imageUrlAll,
  down: params.get("downImg") || params.get("bottomImg") || params.get("yNegImg") || imageUrlAll,
  front: params.get("frontImg") || params.get("zPosImg") || imageUrlAll,
  back: params.get("backImg") || params.get("zNegImg") || imageUrlAll,
};
const textureLoader = new THREE.TextureLoader();
textureLoader.setCrossOrigin("anonymous");
const baseTextures = {};

for (const [face, url] of Object.entries(faceImageUrls)) {
  if (!url) continue;
  baseTextures[face] = textureLoader.load(url, (texture) => {
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.needsUpdate = true;
  });
}

const plasticMaterial = new THREE.MeshStandardMaterial({
  color: palette.plastic,
  roughness: 0.62,
  metalness: 0.02,
});

const cubieGeometry = new THREE.BoxGeometry(CUBIE_SIZE * 0.98, CUBIE_SIZE * 0.98, CUBIE_SIZE * 0.98);
const stickerGeometry = new THREE.PlaneGeometry(CUBIE_SIZE * 0.72, CUBIE_SIZE * 0.72);
const cubies = [];

function imageTile(face, x, y, z) {
  const topRow = 2 - (y + 1);
  if (face === "front") return [x + 1, topRow];
  if (face === "back") return [2 - (x + 1), topRow];
  if (face === "right") return [2 - (z + 1), topRow];
  if (face === "left") return [z + 1, topRow];
  if (face === "up") return [x + 1, z + 1];
  if (face === "down") return [x + 1, 2 - (z + 1)];
  return [1, 1];
}

function stickerMaterial(face, x, y, z) {
  const texture = baseTextures[face];
  if (!texture) {
    return new THREE.MeshStandardMaterial({
      color: palette[face],
      roughness: 0.42,
      metalness: 0.03,
      side: THREE.DoubleSide,
    });
  }

  const [col, row] = imageTile(face, x, y, z);
  const tile = texture.clone();
  tile.colorSpace = THREE.SRGBColorSpace;
  tile.repeat.set(1 / 3, 1 / 3);
  tile.offset.set(col / 3, 1 - (row + 1) / 3);
  tile.needsUpdate = true;

  return new THREE.MeshStandardMaterial({
    color: 0xffffff,
    map: tile,
    roughness: 0.38,
    metalness: 0.02,
    side: THREE.DoubleSide,
  });
}

function makeSticker(material, position, rotation) {
  const sticker = new THREE.Mesh(stickerGeometry, material);
  sticker.position.set(position[0], position[1], position[2]);
  sticker.rotation.set(rotation[0], rotation[1], rotation[2]);
  sticker.receiveShadow = true;
  return sticker;
}

function makeCubie(x, y, z) {
  const group = new THREE.Group();
  group.position.set(x * SPACING, y * SPACING, z * SPACING);

  const body = new THREE.Mesh(cubieGeometry, plasticMaterial);
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Real 3D stickers: colored planes sit on the outside faces of each cubie.
  if (x ===  1) group.add(makeSticker(stickerMaterial("right", x, y, z), [ HALF + 0.006, 0, 0], [0, Math.PI / 2, 0]));
  if (x === -1) group.add(makeSticker(stickerMaterial("left", x, y, z),  [-HALF - 0.006, 0, 0], [0, -Math.PI / 2, 0]));
  if (y ===  1) group.add(makeSticker(stickerMaterial("up", x, y, z),    [0,  HALF + 0.006, 0], [-Math.PI / 2, 0, 0]));
  if (y === -1) group.add(makeSticker(stickerMaterial("down", x, y, z),  [0, -HALF - 0.006, 0], [ Math.PI / 2, 0, 0]));
  if (z ===  1) group.add(makeSticker(stickerMaterial("front", x, y, z), [0, 0,  HALF + 0.006], [0, 0, 0]));
  if (z === -1) group.add(makeSticker(stickerMaterial("back", x, y, z),  [0, 0, -HALF - 0.006], [0, Math.PI, 0]));

  cubeRoot.add(group);
  cubies.push({ group, coord: [x, y, z] });
}

for (let x = -1; x <= 1; x++) {
  for (let y = -1; y <= 1; y++) {
    for (let z = -1; z <= 1; z++) {
      if (x !== 0 || y !== 0 || z !== 0) makeCubie(x, y, z);
    }
  }
}

const MOVES = {
  U: {axis: "y", index: 1, layer:  1, angle:  Math.PI / 2}, "U'": {axis: "y", index: 1, layer:  1, angle: -Math.PI / 2},
  D: {axis: "y", index: 1, layer: -1, angle: -Math.PI / 2}, "D'": {axis: "y", index: 1, layer: -1, angle:  Math.PI / 2},
  R: {axis: "x", index: 0, layer:  1, angle: -Math.PI / 2}, "R'": {axis: "x", index: 0, layer:  1, angle:  Math.PI / 2},
  L: {axis: "x", index: 0, layer: -1, angle:  Math.PI / 2}, "L'": {axis: "x", index: 0, layer: -1, angle: -Math.PI / 2},
  F: {axis: "z", index: 2, layer:  1, angle: -Math.PI / 2}, "F'": {axis: "z", index: 2, layer:  1, angle:  Math.PI / 2},
  B: {axis: "z", index: 2, layer: -1, angle:  Math.PI / 2}, "B'": {axis: "z", index: 2, layer: -1, angle: -Math.PI / 2},
};

const inverseMove = (name) => name.endsWith("'") ? name.slice(0, -1) : `${name}'`;
const easeInOutQuad = (t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

function generateScramble(count) {
  const names = Object.keys(MOVES);
  const sequence = [];
  let lastAxis = null;
  for (let i = 0; i < count; i++) {
    let name = names[(Math.random() * names.length) | 0];
    while (MOVES[name].axis === lastAxis) name = names[(Math.random() * names.length) | 0];
    sequence.push(name);
    lastAxis = MOVES[name].axis;
  }
  return sequence;
}

function rotateCoord(coord, move) {
  let [x, y, z] = coord;
  const clockwise = Math.round(move.angle / (Math.PI / 2));
  const turns = ((clockwise % 4) + 4) % 4;
  for (let i = 0; i < turns; i++) {
    if (move.axis === "x") [y, z] = [-z, y];
    if (move.axis === "y") [x, z] = [ z, -x];
    if (move.axis === "z") [x, y] = [-y, x];
  }
  return [x, y, z];
}

function snapCubie(cubie) {
  cubie.group.position.set(
    cubie.coord[0] * SPACING,
    cubie.coord[1] * SPACING,
    cubie.coord[2] * SPACING,
  );
  cubie.group.position.x = Number(cubie.group.position.x.toFixed(5));
  cubie.group.position.y = Number(cubie.group.position.y.toFixed(5));
  cubie.group.position.z = Number(cubie.group.position.z.toFixed(5));
}

let phase = "scramble";
let queue = generateScramble(SCRAMBLE_MOVES);
let index = 0;
let phaseStart = performance.now();
let moveStart = null;
let moveProgress = 0;
let lastFrameTime = performance.now();
let pivot = null;
let moving = [];

function beginMove(now) {
  const move = MOVES[queue[index]];
  moving = cubies.filter((c) => c.coord[move.index] === move.layer);
  pivot = new THREE.Group();
  cubeRoot.add(pivot);
  for (const cubie of moving) pivot.attach(cubie.group);
  moveStart = now;
  moveProgress = 0;
}

function finishMove(name) {
  const move = MOVES[name];
  for (const cubie of moving) {
    cubeRoot.attach(cubie.group);
    cubie.coord = rotateCoord(cubie.coord, move);
    snapCubie(cubie);
  }
  cubeRoot.remove(pivot);
  pivot = null;
  moving = [];
}

function switchPhase(now) {
  if (phase === "scramble") {
    phase = "solve";
    queue = queue.slice().reverse().map(inverseMove);
  } else {
    phase = "scramble";
    queue = generateScramble(SCRAMBLE_MOVES);
  }
  index = 0;
  phaseStart = now;
  moveStart = null;
  moveProgress = 0;
}

function updateStatus(now) {
  status.classList.toggle("scrambling", phase === "scramble");
  if (phase === "solve") {
    if (MIC_MODE) {
      if (mic.state === "listening") {
        statusText.textContent = `Mic ${Math.round(audioPercent * 100)}% ${formatDb(audioDb)}`;
      } else {
        statusText.textContent = mic.state === "blocked" ? "Use mic=obs" : `Mic ${mic.state}`;
      }
    } else if (OBSWS_MODE) {
      statusText.textContent = obsws.state === "listening"
        ? `OBS ${Math.round(audioPercent * 100)}% ${formatDb(audioDb)}`
        : `OBS ${obsws.state}`;
    } else {
      const remaining = Math.max(0, SOLVE_MS - (now - phaseStart));
      const seconds = Math.ceil(remaining / 1000);
      statusText.textContent = `Solving ${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, "0")}`;
    }
  } else {
    statusText.textContent = (MIC_MODE || OBSWS_MODE) ? `Scrambling • audio` : "Scrambling";
  }
}

function currentMoveDuration() {
  if (phase !== "solve" || (!MIC_MODE && !OBSWS_MODE)) return phase === "solve" ? SOLVE_MS / queue.length : SCRAMBLE_MS;
  const level = readAudioLevel();
  const speed = AUDIO_MIN_SPEED + (AUDIO_MAX_SPEED - AUDIO_MIN_SPEED) * level;
  return normalSolveMoveMs / Math.max(0.01, speed);
}

function resize() {
  const width = Math.max(1, window.innerWidth);
  const height = Math.max(1, window.innerHeight);
  renderer.setSize(width, height, false);
  camera.aspect = width / height;
  const smallest = Math.min(width, height);
  const fit = Math.max(8.2, 11.2 - Math.min(1.6, smallest / 360));
  camera.position.set(5.0, 3.8, fit);
  camera.updateProjectionMatrix();
}

window.addEventListener("resize", resize);
resize();

function animate(now) {
  const deltaMs = Math.min(100, Math.max(0, now - lastFrameTime));
  lastFrameTime = now;
  if (moveStart === null) beginMove(now);

  const name = queue[index];
  const move = MOVES[name];
  const duration = currentMoveDuration();
  moveProgress = Math.min(1, moveProgress + deltaMs / duration);
  const t = moveProgress;
  const eased = easeInOutQuad(t);

  if (pivot) pivot.rotation[move.axis] = move.angle * eased;

  // Gentle display motion, but never enough to flatten the cube for OBS.
  cubeRoot.rotation.x = -0.55 + Math.sin(now / 9000) * 0.06;
  cubeRoot.rotation.y = -0.72 + Math.sin(now / 12000) * 0.10;
  cubeRoot.rotation.z =  0.10 + Math.sin(now / 14000) * 0.03;

  updateStatus(now);
  renderer.render(scene, camera);

  if (t >= 1) {
    finishMove(name);
    index += 1;
    moveStart = null;
    if (index >= queue.length) switchPhase(now);
  }

  requestAnimationFrame(animate);
}

window.addEventListener("keydown", (event) => {
  if (event.code === "Space" && moveStart !== null) moveProgress = 1;
});

initMic();
connectObsWebSocket();
requestAnimationFrame(animate);
</script>
</body>
</html>
