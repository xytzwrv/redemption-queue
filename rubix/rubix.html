<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Three.js Rubix Cube Stream Element</title>
<meta name="description" content="Transparent OBS-ready Three.js Rubix cube that scrambles, slowly solves over a minute, and loops." />
<style>
  * { box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: transparent;
    font-family: "Segoe UI", Inter, system-ui, sans-serif;
  }

  main, canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #status {
    position: fixed;
    right: 16px;
    bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 122px;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 999px;
    background: rgba(10, 12, 18, .52);
    color: #f8f8f2;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .28px;
    text-transform: uppercase;
    backdrop-filter: blur(8px);
    text-shadow: 0 1px 2px rgba(0,0,0,.8);
    pointer-events: none;
  }

  #status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #50fa7b;
    box-shadow: 0 0 12px currentColor;
  }

  #status.scrambling .dot { background: #ffb86c; }

  #controls {
    position: fixed;
    left: 16px;
    bottom: 16px;
    width: min(280px, calc(100vw - 32px));
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 14px;
    background: rgba(10, 12, 18, .52);
    color: #f8f8f2;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .22px;
    backdrop-filter: blur(8px);
    text-shadow: 0 1px 2px rgba(0,0,0,.8);
  }

  #controls[hidden] { display: none; }

  #controls label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  #sensitivityValue {
    color: #8be9fd;
    font-variant-numeric: tabular-nums;
  }

  #sensitivity {
    width: 100%;
    accent-color: #8be9fd;
  }

  @media (max-width: 420px) {
    #status { right: 10px; bottom: 10px; font-size: 10px; min-width: 104px; }
    body.has-controls #status { bottom: 88px; }
    #controls { left: 10px; bottom: 10px; width: min(176px, calc(100vw - 20px)); }
  }
</style>
</head>
<body>
<main aria-label="Animated Three.js self-solving Rubix cube stream element">
  <canvas id="rubixCanvas" aria-hidden="true"></canvas>
</main>
<div id="status" aria-live="polite"><span class="dot"></span><span id="statusText">Loading</span></div>
<div id="controls" hidden>
  <label for="sensitivity">Sensitivity <span id="sensitivityValue">1.00×</span></label>
  <input id="sensitivity" type="range" min="0.1" max="4" step="0.05" value="1" />
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js";

const params = new URLSearchParams(location.search);
const SOLVE_MS = Number(params.get("solveMs")) || 60000;
const SCRAMBLE_MS = Number(params.get("scrambleMs")) || 220;
const SCRAMBLE_MOVES = Number(params.get("moves")) || 24;
const micParam = params.get("mic") || params.get("microphone") || "";
const MIC_MODE = /^(1|true|yes|on)$/i.test(micParam);
const OBSWS_MODE = /^(obs|obsws|websocket)$/i.test(micParam) || /^(1|true|yes|on)$/i.test(params.get("obsws") || "");
const MIC_SILENT_MOVE_MS = Number(params.get("micSilentMs")) || 9500;
const MIC_LOUD_MOVE_MS = Number(params.get("micLoudMs")) || 180;
const OBSWS_URL = params.get("obsWsUrl") || `ws://${params.get("obsHost") || "127.0.0.1"}:${params.get("obsPort") || "4455"}`;
const OBSWS_INPUT = params.get("obsInput") || params.get("input") || "";
const OBSWS_PASSWORD = params.get("obsPassword") || params.get("password") || "";
const SHOW_CONTROLS = /^(1|true|yes|on)$/i.test(params.get("controls") || params.get("slider") || "");
const initialSensitivity = Number(params.get("sensitivity"));
let audioSensitivity = Number.isFinite(initialSensitivity) && initialSensitivity > 0 ? initialSensitivity : 1;
const scaleParam = Number(params.get("scale"));
const CUBE_SCALE = Number.isFinite(scaleParam) && scaleParam > 0 ? scaleParam : 0.82;
const CUBIE_SIZE = Number(params.get("size")) || 1;
const GAP = Number(params.get("gap")) || 0.08;
const SPACING = CUBIE_SIZE + GAP;
const HALF = CUBIE_SIZE / 2;

const canvas = document.getElementById("rubixCanvas");
const status = document.getElementById("status");
const statusText = document.getElementById("statusText");
const controls = document.getElementById("controls");
const sensitivity = document.getElementById("sensitivity");
const sensitivityValue = document.getElementById("sensitivityValue");

function setSensitivity(value) {
  audioSensitivity = THREE.MathUtils.clamp(Number(value) || 1, 0.1, 4);
  sensitivity.value = String(audioSensitivity);
  sensitivityValue.textContent = `${audioSensitivity.toFixed(2)}×`;
}

if (SHOW_CONTROLS) {
  controls.hidden = false;
  document.body.classList.add("has-controls");
}
sensitivity.addEventListener("input", () => setSensitivity(sensitivity.value));
setSensitivity(audioSensitivity);

const mic = {
  state: MIC_MODE ? "starting" : "off",
  analyser: null,
  data: null,
  level: 0,
};

const obsws = {
  state: OBSWS_MODE ? "connecting" : "off",
  socket: null,
  level: 0,
  retryAt: 0,
};

async function initMic() {
  if (!MIC_MODE) return;
  if (!navigator.mediaDevices?.getUserMedia) {
    mic.state = "unavailable";
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
      },
      video: false,
    });
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const context = new AudioContext();
    if (context.state === "suspended") await context.resume();
    const source = context.createMediaStreamSource(stream);
    const analyser = context.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.72;
    source.connect(analyser);
    mic.analyser = analyser;
    mic.data = new Uint8Array(analyser.fftSize);
    mic.state = "listening";
  } catch (error) {
    mic.state = "blocked";
    console.warn("Rubix microphone mode could not start:", error);
  }
}

function readMicLevel() {
  if (!mic.analyser || !mic.data) return mic.level;
  mic.analyser.getByteTimeDomainData(mic.data);
  let sum = 0;
  for (const value of mic.data) {
    const centered = (value - 128) / 128;
    sum += centered * centered;
  }
  const rms = Math.sqrt(sum / mic.data.length);
  const normalized = THREE.MathUtils.clamp((rms - 0.012) / 0.17, 0, 1);
  mic.level = mic.level * 0.82 + normalized * 0.18;
  return mic.level;
}

function base64FromBuffer(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

async function obsAuthResponse(password, salt, challenge) {
  const encoder = new TextEncoder();
  const secret = await crypto.subtle.digest("SHA-256", encoder.encode(password + salt));
  const auth = await crypto.subtle.digest("SHA-256", encoder.encode(base64FromBuffer(secret) + challenge));
  return base64FromBuffer(auth);
}

function extractObsLevel(eventData) {
  const target = OBSWS_INPUT.trim().toLowerCase();
  let best = 0;
  for (const input of eventData?.inputs || []) {
    if (target && String(input.inputName || "").toLowerCase() !== target) continue;
    const levels = Array.isArray(input.inputLevelsMul) ? input.inputLevelsMul.flat(Infinity) : [];
    for (const value of levels) {
      const number = Number(value);
      if (Number.isFinite(number)) best = Math.max(best, number);
    }
  }
  return THREE.MathUtils.clamp(best, 0, 1);
}

function connectObsWebSocket() {
  if (!OBSWS_MODE || obsws.socket || performance.now() < obsws.retryAt) return;
  obsws.state = "connecting";
  const socket = new WebSocket(OBSWS_URL);
  obsws.socket = socket;

  socket.addEventListener("open", () => { obsws.state = "hello"; });
  socket.addEventListener("close", () => {
    obsws.socket = null;
    obsws.state = "closed";
    obsws.retryAt = performance.now() + 5000;
  });
  socket.addEventListener("error", () => { obsws.state = "error"; });
  socket.addEventListener("message", async (message) => {
    let packet;
    try { packet = JSON.parse(message.data); } catch { return; }

    if (packet.op === 0) {
      const identify = { rpcVersion: 1, eventSubscriptions: 1 << 16 };
      const auth = packet.d?.authentication;
      if (auth?.challenge && auth?.salt) {
        if (!OBSWS_PASSWORD) {
          obsws.state = "needs password";
          socket.close();
          return;
        }
        identify.authentication = await obsAuthResponse(OBSWS_PASSWORD, auth.salt, auth.challenge);
      }
      socket.send(JSON.stringify({ op: 1, d: identify }));
    } else if (packet.op === 2) {
      obsws.state = "listening";
    } else if (packet.op === 5 && packet.d?.eventType === "InputVolumeMeters") {
      const level = extractObsLevel(packet.d.eventData);
      obsws.level = obsws.level * 0.72 + level * 0.28;
    }
  });
}

function readAudioLevel() {
  let level = 0;
  if (OBSWS_MODE) {
    connectObsWebSocket();
    level = obsws.state === "listening" ? obsws.level : 0;
  } else {
    level = mic.state === "listening" ? readMicLevel() : 0;
  }
  return THREE.MathUtils.clamp(level * audioSensitivity, 0, 1);
}

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, premultipliedAlpha: false });
renderer.setClearColor(0x000000, 0);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
camera.position.set(5.0, 3.8, 10.5);
camera.lookAt(0, 0, 0);

scene.add(new THREE.HemisphereLight(0xffffff, 0x1f2430, 2.4));
const key = new THREE.DirectionalLight(0xffffff, 2.1);
key.position.set(4, 5, 7);
key.castShadow = true;
scene.add(key);
const rim = new THREE.DirectionalLight(0x8be9fd, 0.85);
rim.position.set(-5, 2, -4);
scene.add(rim);

const cubeRoot = new THREE.Group();
cubeRoot.scale.setScalar(CUBE_SCALE);
scene.add(cubeRoot);

const palette = {
  right: 0xe64b3d,
  left: 0xff9f43,
  up: 0xf8f8f2,
  down: 0xf4d03f,
  front: 0x2ecc71,
  back: 0x3b82f6,
  plastic: 0x11141c,
};

const plasticMaterial = new THREE.MeshStandardMaterial({
  color: palette.plastic,
  roughness: 0.62,
  metalness: 0.02,
});

const stickerMaterials = Object.fromEntries(Object.entries(palette).map(([name, color]) => [
  name,
  new THREE.MeshStandardMaterial({ color, roughness: 0.42, metalness: 0.03, side: THREE.DoubleSide }),
]));

const cubieGeometry = new THREE.BoxGeometry(CUBIE_SIZE * 0.98, CUBIE_SIZE * 0.98, CUBIE_SIZE * 0.98);
const stickerGeometry = new THREE.PlaneGeometry(CUBIE_SIZE * 0.72, CUBIE_SIZE * 0.72);
const cubies = [];

function makeSticker(material, position, rotation) {
  const sticker = new THREE.Mesh(stickerGeometry, material);
  sticker.position.set(position[0], position[1], position[2]);
  sticker.rotation.set(rotation[0], rotation[1], rotation[2]);
  sticker.receiveShadow = true;
  return sticker;
}

function makeCubie(x, y, z) {
  const group = new THREE.Group();
  group.position.set(x * SPACING, y * SPACING, z * SPACING);

  const body = new THREE.Mesh(cubieGeometry, plasticMaterial);
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Real 3D stickers: colored planes sit on the outside faces of each cubie.
  if (x ===  1) group.add(makeSticker(stickerMaterials.right, [ HALF + 0.006, 0, 0], [0, Math.PI / 2, 0]));
  if (x === -1) group.add(makeSticker(stickerMaterials.left,  [-HALF - 0.006, 0, 0], [0, -Math.PI / 2, 0]));
  if (y ===  1) group.add(makeSticker(stickerMaterials.up,    [0,  HALF + 0.006, 0], [-Math.PI / 2, 0, 0]));
  if (y === -1) group.add(makeSticker(stickerMaterials.down,  [0, -HALF - 0.006, 0], [ Math.PI / 2, 0, 0]));
  if (z ===  1) group.add(makeSticker(stickerMaterials.front, [0, 0,  HALF + 0.006], [0, 0, 0]));
  if (z === -1) group.add(makeSticker(stickerMaterials.back,  [0, 0, -HALF - 0.006], [0, Math.PI, 0]));

  cubeRoot.add(group);
  cubies.push({ group, coord: [x, y, z] });
}

for (let x = -1; x <= 1; x++) {
  for (let y = -1; y <= 1; y++) {
    for (let z = -1; z <= 1; z++) {
      if (x !== 0 || y !== 0 || z !== 0) makeCubie(x, y, z);
    }
  }
}

const MOVES = {
  U: {axis: "y", index: 1, layer:  1, angle:  Math.PI / 2}, "U'": {axis: "y", index: 1, layer:  1, angle: -Math.PI / 2},
  D: {axis: "y", index: 1, layer: -1, angle: -Math.PI / 2}, "D'": {axis: "y", index: 1, layer: -1, angle:  Math.PI / 2},
  R: {axis: "x", index: 0, layer:  1, angle: -Math.PI / 2}, "R'": {axis: "x", index: 0, layer:  1, angle:  Math.PI / 2},
  L: {axis: "x", index: 0, layer: -1, angle:  Math.PI / 2}, "L'": {axis: "x", index: 0, layer: -1, angle: -Math.PI / 2},
  F: {axis: "z", index: 2, layer:  1, angle: -Math.PI / 2}, "F'": {axis: "z", index: 2, layer:  1, angle:  Math.PI / 2},
  B: {axis: "z", index: 2, layer: -1, angle:  Math.PI / 2}, "B'": {axis: "z", index: 2, layer: -1, angle: -Math.PI / 2},
};

const inverseMove = (name) => name.endsWith("'") ? name.slice(0, -1) : `${name}'`;
const easeInOutQuad = (t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

function generateScramble(count) {
  const names = Object.keys(MOVES);
  const sequence = [];
  let lastAxis = null;
  for (let i = 0; i < count; i++) {
    let name = names[(Math.random() * names.length) | 0];
    while (MOVES[name].axis === lastAxis) name = names[(Math.random() * names.length) | 0];
    sequence.push(name);
    lastAxis = MOVES[name].axis;
  }
  return sequence;
}

function rotateCoord(coord, move) {
  let [x, y, z] = coord;
  const clockwise = Math.round(move.angle / (Math.PI / 2));
  const turns = ((clockwise % 4) + 4) % 4;
  for (let i = 0; i < turns; i++) {
    if (move.axis === "x") [y, z] = [-z, y];
    if (move.axis === "y") [x, z] = [ z, -x];
    if (move.axis === "z") [x, y] = [-y, x];
  }
  return [x, y, z];
}

function snapCubie(cubie) {
  cubie.group.position.set(
    cubie.coord[0] * SPACING,
    cubie.coord[1] * SPACING,
    cubie.coord[2] * SPACING,
  );
  cubie.group.position.x = Number(cubie.group.position.x.toFixed(5));
  cubie.group.position.y = Number(cubie.group.position.y.toFixed(5));
  cubie.group.position.z = Number(cubie.group.position.z.toFixed(5));
}

let phase = "scramble";
let queue = generateScramble(SCRAMBLE_MOVES);
let index = 0;
let phaseStart = performance.now();
let moveStart = null;
let moveProgress = 0;
let lastFrameTime = performance.now();
let pivot = null;
let moving = [];

function beginMove(now) {
  const move = MOVES[queue[index]];
  moving = cubies.filter((c) => c.coord[move.index] === move.layer);
  pivot = new THREE.Group();
  cubeRoot.add(pivot);
  for (const cubie of moving) pivot.attach(cubie.group);
  moveStart = now;
  moveProgress = 0;
}

function finishMove(name) {
  const move = MOVES[name];
  for (const cubie of moving) {
    cubeRoot.attach(cubie.group);
    cubie.coord = rotateCoord(cubie.coord, move);
    snapCubie(cubie);
  }
  cubeRoot.remove(pivot);
  pivot = null;
  moving = [];
}

function switchPhase(now) {
  if (phase === "scramble") {
    phase = "solve";
    queue = queue.slice().reverse().map(inverseMove);
  } else {
    phase = "scramble";
    queue = generateScramble(SCRAMBLE_MOVES);
  }
  index = 0;
  phaseStart = now;
  moveStart = null;
  moveProgress = 0;
}

function updateStatus(now) {
  status.classList.toggle("scrambling", phase === "scramble");
  if (phase === "solve") {
    if (MIC_MODE) {
      if (mic.state === "listening") {
        statusText.textContent = `Mic solve ${Math.round(mic.level * 100)}%`;
      } else {
        statusText.textContent = mic.state === "blocked" ? "Use mic=obs" : `Mic ${mic.state}`;
      }
    } else if (OBSWS_MODE) {
      statusText.textContent = obsws.state === "listening"
        ? `OBS mic ${Math.round(obsws.level * 100)}%`
        : `OBS ${obsws.state}`;
    } else {
      const remaining = Math.max(0, SOLVE_MS - (now - phaseStart));
      const seconds = Math.ceil(remaining / 1000);
      statusText.textContent = `Solving ${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, "0")}`;
    }
  } else {
    statusText.textContent = (MIC_MODE || OBSWS_MODE) ? `Scrambling • audio` : "Scrambling";
  }
}

function currentMoveDuration() {
  if (phase !== "solve" || (!MIC_MODE && !OBSWS_MODE)) return phase === "solve" ? SOLVE_MS / queue.length : SCRAMBLE_MS;
  const level = readAudioLevel();
  const response = Math.pow(level, 0.62);
  return MIC_SILENT_MOVE_MS - (MIC_SILENT_MOVE_MS - MIC_LOUD_MOVE_MS) * response;
}

function resize() {
  const width = Math.max(1, window.innerWidth);
  const height = Math.max(1, window.innerHeight);
  renderer.setSize(width, height, false);
  camera.aspect = width / height;
  const smallest = Math.min(width, height);
  const fit = Math.max(8.2, 11.2 - Math.min(1.6, smallest / 360));
  camera.position.set(5.0, 3.8, fit);
  camera.updateProjectionMatrix();
}

window.addEventListener("resize", resize);
resize();

function animate(now) {
  const deltaMs = Math.min(100, Math.max(0, now - lastFrameTime));
  lastFrameTime = now;
  if (moveStart === null) beginMove(now);

  const name = queue[index];
  const move = MOVES[name];
  const duration = currentMoveDuration();
  moveProgress = Math.min(1, moveProgress + deltaMs / duration);
  const t = moveProgress;
  const eased = easeInOutQuad(t);

  if (pivot) pivot.rotation[move.axis] = move.angle * eased;

  // Gentle display motion, but never enough to flatten the cube for OBS.
  cubeRoot.rotation.x = -0.55 + Math.sin(now / 9000) * 0.06;
  cubeRoot.rotation.y = -0.72 + Math.sin(now / 12000) * 0.10;
  cubeRoot.rotation.z =  0.10 + Math.sin(now / 14000) * 0.03;

  updateStatus(now);
  renderer.render(scene, camera);

  if (t >= 1) {
    finishMove(name);
    index += 1;
    moveStart = null;
    if (index >= queue.length) switchPhase(now);
  }

  requestAnimationFrame(animate);
}

window.addEventListener("keydown", (event) => {
  if (event.code === "Space" && moveStart !== null) moveProgress = 1;
});

initMic();
connectObsWebSocket();
requestAnimationFrame(animate);
</script>
</body>
</html>
